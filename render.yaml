databases:
  - name: farmacia-db
    databaseName: farmacia
    user: farmacia
    # Instancia real: Basic-1gb (1 GB RAM, 0.5 CPU). Bajada desde Basic-4gb el
    # 2026-07-06 — la base usaba solo ~0.8 GB de 20 GB, 4 GB era sobredimensionado
    # (ahorro ~$56/mo). El yaml se mantiene alineado para que un sync del
    # Blueprint no la re-suba. Si escasea CPU/conexiones, activar el connection
    # pool o volver a basic_4gb.
    plan: basic_1gb
    region: oregon

services:
  - type: web
    name: farmacia-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    # Corre las migraciones inline (init_db) ANTES de que la versión nueva
    # reciba tráfico → el schema queda al día y no hay 500 por columna nueva
    # inexistente (ej. usa_packs). Idempotente y rápido (solo DDL; los backfills
    # pesados están gateados con RUN_BACKFILLS=1 y corren async aparte).
    # Requiere instance type pago (no free). Si fuera free, Render lo ignora →
    # usar el fallback del start-script (ver docs/lecciones_deploy_render.md).
    preDeployCommand: python scripts/migrate.py
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmacia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TZ
        value: America/Argentina/Buenos_Aires

# NOTA: AppNúcleo (dashboard de grupo, appnucleo/) NO se declara acá a propósito.
# Meterlo en este Blueprint obligaría a un "Apply/Sync" que re-evalúa TODO el yaml
# contra lo que corre y podría pisar farmacia-web/farmacia-db (ya pasó: el plan
# stale 'free' de la DB casi la degrada en un sync). Se crea como Web Service
# MANUAL en el dashboard, aislado. Config en docs/lecciones_deploy_render.md.
