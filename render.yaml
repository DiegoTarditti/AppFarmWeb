databases:
  - name: farmacia-db
    databaseName: farmacia
    user: farmacia
    plan: free
    region: oregon

services:
  - type: web
    name: farmacia-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmacia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TZ
        value: America/Argentina/Buenos_Aires
