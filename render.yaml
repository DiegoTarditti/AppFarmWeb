databases:
  - name: farmacia-db
    databaseName: farmacia
    user: farmacia
    # Instancia real: Basic-4gb (4 GB RAM, 2 CPU, 20 GB). El yaml decía 'free'
    # (stale) — alineado para que un sync del Blueprint no intente bajarla a free.
    plan: basic_4gb
    region: oregon

services:
  - type: web
    name: farmacia-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    # Corre las migraciones inline (init_db) ANTES de que la versión nueva
    # reciba tráfico → el schema queda al día y no hay 500 por columna nueva
    # inexistente (ej. usa_packs). Idempotente y rápido (solo DDL; los backfills
    # pesados están gateados con RUN_BACKFILLS=1 y corren async aparte).
    # Requiere instance type pago (no free). Si fuera free, Render lo ignora →
    # usar el fallback del start-script (ver docs/lecciones_deploy_render.md).
    preDeployCommand: python scripts/migrate.py
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmacia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TZ
        value: America/Argentina/Buenos_Aires
