name: CI

on:
  push:
    branches: [main, desarrollo]
  pull_request:
    branches: [main, desarrollo]

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile all .py files
        run: python -m compileall -q .

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: System libs (camelot/pdfplumber)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ghostscript libgl1 poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest -q --tb=short
