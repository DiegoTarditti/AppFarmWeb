<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabla detectada — {{ filename }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background:#f3f3f3; color:#1e1e1e; font-family:'Inter',sans-serif; }</style>
</head>
<body class="min-h-screen">

<header class="bg-white border-b border-[#e0e0e0] px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div>
            <span class="font-bold text-sm">Detección automática</span>
            <span class="ml-3 text-xs text-[#6f6f6f] font-mono">{{ filename }}</span>
        </div>
        <a href="{{ url_for('converter_helper', token=token) }}" class="text-xs text-[#6f6f6f] hover:text-[#1e1e1e]">← Volver</a>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-6 space-y-4">
    <div class="bg-white rounded-xl border border-[#e0e0e0] p-5">
        <div class="flex items-center justify-between">
            <div>
                <p class="font-semibold text-sm">{{ source }}</p>
                <p class="text-xs text-[#6f6f6f]">{{ rows|length }} filas · Revisalas antes de exportar</p>
            </div>
            <button onclick="exportXLSX()" class="px-4 py-2 text-xs rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-semibold">Exportar XLSX ↓</button>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-[#e0e0e0] overflow-hidden">
        <div class="overflow-x-auto max-h-[70vh] overflow-y-auto">
            <table id="tbl" class="w-full text-xs border-collapse">
                <tbody>
                {% for row in rows %}
                    <tr class="{{ 'bg-[#f5f5f5]' if loop.index0 % 2 else 'bg-white' }}">
                    {% for cell in row %}
                        <td class="border border-[#e0e0e0] px-2 py-1 whitespace-nowrap">{{ cell or '' }}</td>
                    {% endfor %}
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function exportXLSX() {
    const rows = Array.from(document.querySelectorAll('#tbl tr')).map(tr =>
        Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim())
    );
    if (!rows.length) { alert('No hay filas.'); return; }
    const maxCols = Math.max(...rows.map(r => r.length));
    const fields = Array.from({length: maxCols}, (_,i) => 'col_' + (i+1));
    const payload = rows.map(r => {
        const obj = {};
        fields.forEach((f,i) => obj[f] = r[i] || '');
        return obj;
    });
    const resp = await fetch('{{ url_for("converter_export", token=token) }}', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ rows: payload, fields: fields, header: {} })
    });
    if (!resp.ok) { alert('Error al exportar.'); return; }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = '{{ filename }}.xlsx'.replace(/\.pdf\.xlsx$/i,'.xlsx');
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
