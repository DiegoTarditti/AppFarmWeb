<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atención · Badia</title>
<style>
  :root { --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  * { box-sizing: border-box; }
  /* Sin CDN de iconos: glifos de texto para los funcionales; el resto es
     decorativo y se omite (los labels de texto alcanzan). */
  .ti { font-style:normal; line-height:1; display:inline-block; }
  .ti-plus::before{content:"+"} .ti-minus::before{content:"−"} .ti-x::before{content:"✕"} .ti-chevron-down::before{content:"▾"}
  .ti-pill::before{content:"💊"}   /* la pastilla se queda 🙂 */
  .ti-send::before,.ti-search::before,.ti-robot::before,.ti-clipboard-list::before,
  .ti-prescription::before,.ti-alert-triangle::before,.ti-moon::before,.ti-sun::before,
  .ti-id::before,.ti-phone::before,.ti-map-pin::before{ content:""; }
  body { margin:0; height:100vh; overflow:hidden; font-family:var(--font-sans); background:#0d0d12; }
  #app { height:100vh; display:flex; flex-direction:column; }

  /* ── Paleta (de la maqueta de Diego: dark + light) ── */
  #app.dark {
    --bg:#14141a; --bd:rgba(255,255,255,0.08); --topbar:#1a1a22; --side:#16161d; --chat:#14141a;
    --title:#f0f0f3; --txt:#c8c8ce; --muted:#6a6a72; --muted2:#8a8a92; --accent:#1D9E75; --accenttxt:#5DCAA5;
    --logo-bg:#534AB7; --logo-tx:#EEEDFE; --me-bg:#534AB7; --me-tx:#EEEDFE; --dot-bd:#1a1a22;
    --bubin:#23232d; --bubin-tx:#e0e0e6; --bubbot:#1f1d2e; --bubbot-tx:#d8d4f0; --bot:#7F77DD;
    --card:#16161d; --card-bd:#185FA5; --cardhead-bd:rgba(255,255,255,0.06); --cardic:#0c2236; --cardic-tx:#85B7EB;
    --row-bd:rgba(255,255,255,0.05); --total-bg:#191921; --total:#f0f0f3; --qm:#23232d; --qm-tx:#9a9aa2; --qp:#1f1d2e; --qp-tx:#AFA9EC;
    --pop:#1a1a22; --pop-bd:rgba(255,255,255,0.1); --caret:#85B7EB; --rx-bg:#3a1f1f; --rx-tx:#F09595;
    --prod-bg:#0c2236; --prod-bd:#185FA5; --prod-tx:#85B7EB; --clip-bg:#1f1f29; --clip-tx:#9a9aa2;
    --input:#1f1f29; --input-tx:#e0e0e6; --send-bg:#534AB7; --send-tx:#EEEDFE;
    --badge-bg:#534AB7; --badge-tx:#EEEDFE; --day-bg:#1a1a22; --hov:#2e2e3a; --menu:#23232d; --menu-tx:#e0e0e6;
    --busy:#EF9F27; --busytx:#EF9F27; --busyav:#0F6E56; --busyav-tx:#E1F5EE; --away:#5F5E5A; --awaytx:#8a8a92; --awayav:#3a3a42; --awayav-tx:#9a9aa2;
    --alert-bg:#2a1812; --alert-tx:#F0997B; --tagb-bg:#1f1d2e; --tagb-tx:#AFA9EC; --tagg-bg:#102a22; --tagg-tx:#5DCAA5;
    --theme-bd:rgba(255,255,255,0.15); --active-bd:#D85A30;
  }
  #app.light {
    --bg:#dbe5e6; --bd:#b8c8c9; --topbar:#cdd9da; --side:#d2dedf; --chat:#dde7e8;
    --title:#1f3a36; --txt:#2c3e3b; --muted:#6f807d; --muted2:#5f6e6b; --accent:#0F6E56; --accenttxt:#0F6E56;
    --logo-bg:#0F6E56; --logo-tx:#E1F5EE; --me-bg:#0F6E56; --me-tx:#E1F5EE; --dot-bd:#cdd9da;
    --bubin:#eef4f4; --bubin-tx:#2c3e3b; --bubbot:#dceaf5; --bubbot-tx:#0c447c; --bot:#185FA5;
    --card:#eef4f4; --card-bd:#5DCAA5; --cardhead-bd:#d0dcdc; --cardic:#d6efe6; --cardic-tx:#0F6E56;
    --row-bd:#dde7e7; --total-bg:#e2eeed; --total:#0F6E56; --qm:#d8e3e3; --qm-tx:#5f6e6b; --qp:#d6efe6; --qp-tx:#0F6E56;
    --pop:#eef4f4; --pop-bd:#c2d0d1; --caret:#0F6E56; --rx-bg:#f6dada; --rx-tx:#a32d2d;
    --prod-bg:#d6efe6; --prod-bd:#5DCAA5; --prod-tx:#0F6E56; --clip-bg:#e2eeed; --clip-tx:#5f6e6b;
    --input:#eef4f4; --input-tx:#2c3e3b; --send-bg:#0F6E56; --send-tx:#E1F5EE;
    --badge-bg:#0F6E56; --badge-tx:#E1F5EE; --day-bg:#cdd9da; --hov:#dbe8e8; --menu:#eef4f4; --menu-tx:#2c3e3b;
    --busy:#BA7517; --busytx:#854F0B; --busyav:#185FA5; --busyav-tx:#E6F1FB; --away:#888780; --awaytx:#5f6e6b; --awayav:#a8b4b5; --awayav-tx:#5a6664;
    --alert-bg:#f6e0d6; --alert-tx:#993c1d; --tagb-bg:#dceaf5; --tagb-tx:#0c447c; --tagg-bg:#d6efe6; --tagg-tx:#0F6E56;
    --theme-bd:#b8c8c9; --active-bd:#D85A30;
  }

  /* ── Mapeo de clases a tokens ── */
  #app { background:var(--bg); color:var(--txt); }
  .topbar { background:var(--topbar); border-color:var(--bd); }
  .logo { background:var(--logo-bg); color:var(--logo-tx); }
  .title { color:var(--title); } .txt { color:var(--txt); } .muted { color:var(--muted); } .muted2 { color:var(--muted2); }
  .accent-txt { color:var(--accenttxt); }
  #theme-btn { border-color:var(--theme-bd); color:var(--muted2); }
  #me-btn { background:var(--me-bg); color:var(--me-tx); } #me-dot { border-color:var(--dot-bd); }
  #me-toggle { color:var(--accenttxt); }
  #me-menu { background:var(--menu); border-color:var(--pop-bd); } #me-menu .opt { color:var(--menu-tx); }
  .opt:hover { background:var(--hov); }
  .col-side { background:var(--side); border-color:var(--bd); } .side-head { border-color:var(--bd); }
  .conv { border-color:var(--bd); cursor:pointer; } .conv:hover { background:var(--hov); }
  .conv-active { background:var(--bubin); border:1px solid var(--active-bd) !important; }
  .badge { background:var(--badge-bg); color:var(--badge-tx); }
  .col-chat { background:var(--chat); } .chat-head { border-color:var(--bd); }
  .daypill { background:var(--day-bg); color:var(--muted); }
  .bub-in { background:var(--bubin); color:var(--bubin-tx); } .bub-bot { background:var(--bubbot); color:var(--bubbot-tx); } .bot-ic { color:var(--bot); }
  .bub-me { background:var(--me-bg); color:var(--me-tx); }
  .sys { color:var(--muted); }
  .composer { background:var(--side); border-color:var(--bd); }
  .input { background:var(--input); color:var(--input-tx); border:0.5px solid var(--bd); }
  .input::placeholder { color:var(--muted); }
  .btn-prod { background:var(--prod-bg); border-color:var(--prod-bd); color:var(--prod-tx); }
  .btn-clip { background:var(--clip-bg); color:var(--clip-tx); }
  .btn-send { background:var(--send-bg); color:var(--send-tx); }
  .search-pop { background:var(--pop); border-color:var(--pop-bd); }
  .sp-head { border-color:var(--cardhead-bd); }
  .sp-row { border-color:var(--row-bd); }
  .sp-row.click { cursor:pointer; } .sp-row.click:hover { background:var(--hov); }
  .rx { background:var(--rx-bg); color:var(--rx-tx); }
  .card-ic { background:var(--cardic); color:var(--cardic-tx); }
  .card { background:var(--card); border-color:var(--card-bd); }
  .card-head { border-color:var(--cardhead-bd); }
  .row { border-color:var(--row-bd); }
  .card-total { background:var(--total-bg); border-color:var(--bd); } .total-amt { color:var(--total); }
  .qbtn-m { background:var(--qm); color:var(--qm-tx); cursor:pointer; }
  .qbtn-p { background:var(--qp); color:var(--qp-tx); cursor:pointer; }
  .seg { background:var(--bubin); color:var(--muted2); border:0.5px solid var(--bd); cursor:pointer; }
  .seg.on { background:var(--me-bg); color:var(--me-tx); border-color:var(--me-bg); }
  .hbtn { border:0.5px solid var(--bd); background:var(--bubin); color:var(--txt); cursor:pointer; }
  .hbtn:hover { background:var(--hov); }
  .hbtn-ok { background:var(--accent); color:#fff; border-color:var(--accent); }
  .hbtn-info { background:#2563eb; color:#fff; border-color:#2563eb; }
  .bt { border-color:var(--bd); }
  .alert { background:var(--alert-bg); color:var(--alert-tx); }
  .tag-blue { background:var(--tagb-bg); color:var(--tagb-tx); } .tag-green { background:var(--tagg-bg); color:var(--tagg-tx); }
  ::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-thumb{ background:var(--hov); border-radius:9px; }
</style>
</head>
<body>
<div id="app" class="dark">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div class="topbar" style="display:flex; align-items:center; justify-content:space-between; padding:10px 18px; border-bottom:0.5px solid; flex-shrink:0;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="logo" style="width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center;"><i class="ti ti-plus" style="font-size:18px"></i></div>
      <span class="title" style="font-size:14px; font-weight:600;">Atención · Badia</span>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <select id="filtroLinea" onchange="cargarBandeja()" aria-label="Línea" class="input" style="border-radius:8px; padding:5px 10px; font-size:12px;">
        <option value="">Todas las líneas</option>
        {% for l in lineas %}<option value="{{ l }}">{{ l }}</option>{% endfor %}
      </select>

      <button id="theme-btn" aria-label="Cambiar tema" style="cursor:pointer; display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:20px; border:0.5px solid; background:transparent;">
        <i id="theme-icon" class="ti ti-moon" style="font-size:14px"></i>
        <span id="theme-text" style="font-size:10px;">Oscuro</span>
      </button>

      <div style="position:relative; display:flex; flex-direction:column; align-items:center; gap:4px;">
        <button id="me-btn" aria-label="Mi estado" style="cursor:pointer; position:relative; width:26px; height:26px; border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600;">{{ (current_user.nombre_completo or current_user.username)[:2]|upper }}<span id="me-dot" style="position:absolute; bottom:-1px; right:-1px; width:9px; height:9px; border-radius:50%; background:#1D9E75; border:2px solid;"></span></button>
        <button id="me-toggle" style="cursor:pointer; border:none; background:transparent; display:flex; align-items:center; gap:3px; font-size:9px;"><span id="me-mini" style="width:5px;height:5px;border-radius:50%;background:#1D9E75;"></span><span id="me-label">Online</span><i class="ti ti-chevron-down" style="font-size:9px"></i></button>
        <div id="me-menu" style="display:none; position:absolute; top:54px; right:0; border:0.5px solid; border-radius:10px; padding:4px; min-width:118px; z-index:30;">
          <div class="opt" data-s="online" style="display:flex; align-items:center; gap:7px; padding:7px 10px; border-radius:7px; cursor:pointer; font-size:11px;"><span style="width:7px;height:7px;border-radius:50%;background:#1D9E75;"></span>Online</div>
          <div class="opt" data-s="busy" style="display:flex; align-items:center; gap:7px; padding:7px 10px; border-radius:7px; cursor:pointer; font-size:11px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--busy);"></span>Ocupado</div>
          <div class="opt" data-s="away" style="display:flex; align-items:center; gap:7px; padding:7px 10px; border-radius:7px; cursor:pointer; font-size:11px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--away);"></span>Ausente</div>
        </div>
      </div>
      <a href="{{ url_for('auth_logout') }}" class="hbtn" style="font-size:12px; padding:5px 11px; border-radius:8px;">Salir</a>
    </div>
  </div>

  <!-- ── 3 columnas ─────────────────────────────────────────────────────── -->
  <div style="display:grid; grid-template-columns:300px 1fr 330px; flex:1; min-height:0;">

    <!-- Lista de conversaciones -->
    <div class="col-side" style="border-right:0.5px solid; display:flex; flex-direction:column; min-height:0;">
      <div class="side-head" style="padding:9px 10px; display:flex; gap:6px; border-bottom:0.5px solid;">
        <button data-vista="sin_asignar" onclick="setVista('sin_asignar')" class="seg" style="flex:1; padding:6px 4px; border-radius:7px; font-size:11px;">Sin asignar <b id="cnt-sin_asignar">0</b></button>
        <button data-vista="mias" onclick="setVista('mias')" class="seg" style="flex:1; padding:6px 4px; border-radius:7px; font-size:11px;">Mías <b id="cnt-mias">0</b></button>
        <button data-vista="todas" onclick="setVista('todas')" class="seg" style="flex:1; padding:6px 4px; border-radius:7px; font-size:11px;">Todas <b id="cnt-todas">0</b></button>
      </div>
      <div id="bandeja" style="flex:1; overflow-y:auto; min-height:0;">
        <div class="muted" style="padding:16px; font-size:13px;">Cargando…</div>
      </div>
    </div>

    <!-- Chat -->
    <div class="col-chat" style="display:flex; flex-direction:column; min-height:0;">
      <div class="chat-head" style="padding:9px 16px; border-bottom:0.5px solid; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:50px;">
        <div id="chatHeadInner" class="muted" style="font-size:13px;">Elegí una conversación 👈</div>
        <div id="chatAcciones" style="display:none; align-items:center; gap:7px; flex-shrink:0;">
          <button id="btnTomar" onclick="tomar()" class="hbtn hbtn-ok" style="display:none; font-size:12px; padding:5px 11px; border-radius:8px;">Tomar</button>
          <button onclick="toggleTransfer()" class="hbtn hbtn-info" style="font-size:12px; padding:5px 11px; border-radius:8px;">Transferir</button>
          <button onclick="devolverCola()" class="hbtn" style="font-size:12px; padding:5px 11px; border-radius:8px;">A la cola</button>
          <button onclick="cerrarConv()" class="hbtn" style="font-size:12px; padding:5px 11px; border-radius:8px;">Al bot</button>
        </div>
      </div>

      <div id="panelTransfer" style="display:none; gap:8px; align-items:center; flex-wrap:wrap; padding:9px 16px; border-bottom:0.5px solid; border-color:var(--bd); background:var(--side);">
        <span class="muted" style="font-size:12px;">Pasar a:</span>
        <select id="selOperador" aria-label="Operador" class="input" style="border-radius:8px; padding:5px 9px; font-size:12px;"></select>
        <input id="notaTransfer" type="text" placeholder="Nota (opcional)…" autocomplete="off" class="input" style="flex:1; min-width:140px; border-radius:8px; padding:5px 9px; font-size:12px;">
        <button onclick="confirmarTransfer()" class="hbtn hbtn-info" style="font-size:12px; padding:5px 11px; border-radius:8px;">Pasar ▸</button>
        <button onclick="toggleTransfer()" class="hbtn" style="font-size:12px; padding:5px 11px; border-radius:8px;">Cancelar</button>
      </div>

      <div id="chat" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; min-height:0;">
        <div class="muted" style="text-align:center; margin-top:40px; font-size:13px;">No hay conversación abierta.</div>
      </div>

      <div id="composer" class="composer" style="display:none; border-top:0.5px solid; position:relative;">
        <!-- Card "Detalle del pedido" en construcción -->
        <div id="pedidoCard" style="display:none; margin:10px 14px 0;">
          <div class="card" style="border:1px solid; border-radius:14px; overflow:hidden;">
            <div class="card-head" style="padding:8px 13px; display:flex; align-items:center; justify-content:space-between; border-bottom:0.5px solid;">
              <div style="display:flex; align-items:center; gap:9px;">
                <div class="card-ic" style="width:24px; height:24px; border-radius:7px; display:flex; align-items:center; justify-content:center;"><i class="ti ti-clipboard-list" style="font-size:13px"></i></div>
                <span class="txt" style="font-size:11px;">Detalle del pedido</span>
              </div>
              <button onclick="vaciarPedido()" class="muted" style="background:none; border:none; cursor:pointer; font-size:10px;">Vaciar</button>
            </div>
            <div id="pedidoRows" style="padding:2px 13px;"></div>
            <div class="card-total" style="padding:9px 13px; border-top:0.5px solid; display:flex; justify-content:space-between; align-items:center;">
              <span class="muted2" style="font-size:11px;">Total</span>
              <span id="pedidoTotal" class="total-amt" style="font-size:16px; font-weight:600;">$0</span>
            </div>
          </div>
          <button onclick="enviarPedido()" class="hbtn hbtn-ok" style="margin-top:6px; width:100%; border-radius:9px; padding:7px; font-size:12px;">Enviar pedido al cliente ▸</button>
        </div>

        <!-- Popup buscador de productos -->
        <div id="searchPop" class="search-pop" style="display:none; margin:10px 14px 0; border:0.5px solid; border-radius:12px; overflow:hidden;">
          <div class="sp-head" style="padding:8px 12px; display:flex; align-items:center; gap:8px; border-bottom:0.5px solid;">
            <i class="ti ti-search accent-txt" style="font-size:13px"></i>
            <input id="prodQuery" type="text" placeholder="Buscar producto…" autocomplete="off" oninput="onProdInput()"
                   class="txt" style="flex:1; background:transparent; border:none; outline:none; font-size:12px;">
            <span id="prodCount" class="muted" style="font-size:9px; flex-shrink:0;"></span>
            <i class="ti ti-x muted" onclick="toggleBuscador()" style="font-size:13px; cursor:pointer;"></i>
          </div>
          <div id="prodResultados" style="max-height:280px; overflow-y:auto;"></div>
        </div>

        <div style="padding:10px 14px; display:flex; align-items:center; gap:8px;">
          <div class="btn-prod" title="Buscar producto" onclick="toggleBuscador()" style="width:34px; height:34px; border-radius:50%; border:0.5px solid; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;"><i class="ti ti-pill" style="font-size:16px"></i></div>
          <input id="inputMsg" type="text" placeholder="Escribí un mensaje…" autocomplete="off" onkeydown="if(event.key==='Enter')enviar()" class="input" style="flex:1; border-radius:18px; padding:9px 14px; font-size:13px;">
          <div class="btn-send" onclick="enviar()" title="Enviar" style="padding:9px 18px; border-radius:18px; display:flex; align-items:center; cursor:pointer; flex-shrink:0; font-size:13px; font-weight:600;">Enviar</div>
        </div>
      </div>
    </div>

    <!-- Ficha del cliente -->
    <div class="col-side" style="border-left:0.5px solid; overflow-y:auto; min-height:0;">
      <div id="ficha" style="padding:16px 14px; font-size:11px;">
        <div class="muted">Abrí una conversación para ver al cliente.</div>
      </div>
    </div>

  </div>
</div>

<script>
const YO = {{ current_user.id }};
let convAbierta = null, convData = null, ultimoMsgId = 0, vista = 'sin_asignar', todasConvs = [];

/* ── Tema (claro/oscuro) ── */
(function(){
  const app = document.getElementById('app');
  const saved = localStorage.getItem('atencion-theme') || 'dark';
  setTheme(saved);
  document.getElementById('theme-btn').addEventListener('click', () =>
    setTheme(app.classList.contains('dark') ? 'light' : 'dark'));
  function setTheme(t){
    app.className = t;
    document.getElementById('theme-icon').className = 'ti ' + (t === 'dark' ? 'ti-moon' : 'ti-sun');
    document.getElementById('theme-text').textContent = t === 'dark' ? 'Oscuro' : 'Claro';
    localStorage.setItem('atencion-theme', t);
  }
})();

/* ── Estado propio (cosmético por ahora; presencia real = próxima fase) ── */
(function(){
  const menu = document.getElementById('me-menu');
  const tg = e => { e.stopPropagation(); menu.style.display = menu.style.display === 'none' ? 'block' : 'none'; };
  document.getElementById('me-toggle').addEventListener('click', tg);
  document.getElementById('me-btn').addEventListener('click', tg);
  const cols = {online:'#1D9E75', busy:'var(--busy)', away:'var(--away)'};
  const labels = {online:'Online', busy:'Ocupado', away:'Ausente'};
  document.querySelectorAll('#me-menu .opt').forEach(o => o.addEventListener('click', e => {
    e.stopPropagation();
    const s = o.dataset.s;
    document.getElementById('me-dot').style.background = cols[s];
    document.getElementById('me-mini').style.background = cols[s];
    document.getElementById('me-label').textContent = labels[s];
    document.getElementById('me-btn').style.opacity = s === 'away' ? '0.55' : '1';
    menu.style.display = 'none';
    localStorage.setItem('atencion-estado', s);
  }));
  document.addEventListener('click', () => { menu.style.display = 'none'; });
})();

/* ── Bandeja ── */
function setVista(v) {
  vista = v;
  document.querySelectorAll('.seg').forEach(b => b.classList.toggle('on', b.dataset.vista === v));
  renderBandeja();
}
function _filtrar(c) {
  if (vista === 'sin_asignar') return c.filter(x => x.estado === 'cola');
  if (vista === 'mias')        return c.filter(x => x.estado === 'humano' && x.operador_id === YO);
  return c;
}
async function cargarBandeja() {
  const linea = document.getElementById('filtroLinea').value;
  const d = await (await fetch('/atencion/api/conversaciones?linea=' + encodeURIComponent(linea))).json();
  todasConvs = d.conversaciones || [];
  document.getElementById('cnt-sin_asignar').textContent = todasConvs.filter(c => c.estado === 'cola').length;
  document.getElementById('cnt-mias').textContent = todasConvs.filter(c => c.estado === 'humano' && c.operador_id === YO).length;
  document.getElementById('cnt-todas').textContent = todasConvs.length;
  renderBandeja();
}
function renderBandeja() {
  const convs = _filtrar(todasConvs);
  const box = document.getElementById('bandeja');
  if (!convs.length) { box.innerHTML = '<div class="muted" style="padding:16px; font-size:13px;">Nada por acá ✨</div>'; return; }
  box.innerHTML = convs.map(c => {
    const activa = c.id === convAbierta;
    let asign = '';
    if (c.estado === 'humano' && c.operador_id) {
      const mio = c.operador_id === YO;
      asign = `<span style="font-size:10px; color:${mio ? 'var(--accenttxt)' : 'var(--busytx)'}">· ${esc(mio ? 'Vos' : (c.operador_nombre || 'otro'))}</span>`;
    }
    const badge = c.estado === 'cola'
      ? '<span class="badge" style="font-size:9px; padding:1px 7px; border-radius:8px;">cola</span>'
      : '<span class="accent-txt" style="font-size:9px;">●</span>';
    return `
    <div onclick="abrirConv(${c.id})" class="conv ${activa ? 'conv-active' : ''}"
         style="margin:${activa ? '7px' : '0'}; padding:9px 12px; ${activa ? 'border-radius:8px;' : 'border-bottom:0.5px solid;'}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3px;">
        <span class="${activa ? 'title' : 'txt'}" style="font-size:13px; font-weight:${activa ? 600 : 400}; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(c.nombre)}</span>
        <span class="muted" style="font-size:10px;">${esc(c.ultimo_en)}</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; gap:6px;">
        <span class="muted" style="font-size:11px;">${esc(c.linea)} ${asign}</span>
        ${badge}
      </div>
    </div>`;
  }).join('');
}

/* ── Chat ── */
async function abrirConv(id) {
  convAbierta = id; ultimoMsgId = 0;
  document.getElementById('panelTransfer').style.display = 'none';
  document.getElementById('searchPop').style.display = 'none';
  vaciarPedido();
  document.getElementById('chat').innerHTML = '<div class="muted" style="text-align:center; margin-top:40px; font-size:13px;">Cargando…</div>';
  await refrescarChat(true);
  cargarFicha();
  document.getElementById('composer').style.display = 'block';
  document.getElementById('chatAcciones').style.display = 'flex';
  renderBandeja();
}
async function refrescarChat(reset) {
  if (!convAbierta) return;
  const r = await fetch(`/atencion/api/${convAbierta}/mensajes?desde=${reset ? 0 : ultimoMsgId}`);
  if (!r.ok) return;
  const d = await r.json();
  convData = d.conversacion;
  const chat = document.getElementById('chat');
  if (reset) chat.innerHTML = '';
  pintarHeader();
  for (const m of (d.mensajes || [])) { chat.appendChild(burbuja(m)); ultimoMsgId = Math.max(ultimoMsgId, m.id); }
  if (d.mensajes && d.mensajes.length) chat.scrollTop = chat.scrollHeight;
}
function pintarHeader() {
  const c = convData; if (!c) return;
  const mio = c.estado === 'humano' && c.operador_id === YO;
  let sub = '';
  if (c.estado === 'humano' && !mio) sub = `<span style="color:var(--busytx)">Atendida por ${esc(c.operador_nombre || 'otro')}</span>`;
  else if (mio) sub = '<span class="accent-txt">Te la asignaste</span>';
  else if (c.estado === 'cola') sub = '<span class="accent-txt">En cola</span>';
  document.getElementById('chatHeadInner').innerHTML =
    `<div class="title" style="font-size:13px; font-weight:600;">${esc(c.nombre)}</div>
     <div style="font-size:10px;">${esc(c.linea)} · ${sub}</div>`;
  document.getElementById('btnTomar').style.display = mio ? 'none' : 'inline-block';
}
function burbuja(m) {
  const div = document.createElement('div');
  if (m.origen === 'sistema') {
    div.style.alignSelf = 'center';
    div.innerHTML = `<div class="daypill" style="font-size:10px; padding:3px 12px; border-radius:10px;">${esc(m.texto)}</div>`;
    return div;
  }
  const cliente = m.origen === 'cliente', esBot = m.origen === 'bot';
  div.style.alignSelf = cliente ? 'flex-start' : 'flex-end';
  div.style.maxWidth = '78%';
  const cls = cliente ? 'bub-in' : esBot ? 'bub-bot' : 'bub-me';
  const radius = cliente ? '14px 14px 14px 4px' : '14px 14px 4px 14px';
  const head = esBot
    ? '<div style="display:flex; align-items:center; gap:5px; margin-bottom:3px;"><i class="ti ti-robot bot-ic" style="font-size:11px"></i><span class="bot-ic" style="font-size:9px;">Bot</span></div>'
    : '';
  div.innerHTML = `${head}
    <div class="${cls}" style="padding:8px 12px; border-radius:${radius}; font-size:12px; line-height:1.5; white-space:pre-wrap;">${m.tiene_imagen ? '📷 ' : ''}${esc(m.texto)}</div>
    <div class="muted" style="font-size:9px; margin-top:3px; ${cliente ? 'margin-left:4px;' : 'text-align:right; margin-right:4px;'}">${esc(m.hora)}</div>`;
  return div;
}

async function tomar() {
  if (!convAbierta) return;
  const r = await fetch(`/atencion/${convAbierta}/tomar`, {method: 'POST'});
  if (r.status === 409) { const d = await r.json(); alert('⚠️ Ya la está atendiendo ' + (d.conflicto || 'otro operador') + '.'); }
  await refrescarChat(true); cargarBandeja();
}
async function devolverCola() {
  if (!convAbierta) return;
  await fetch(`/atencion/${convAbierta}/devolver-cola`, {method: 'POST'});
  await refrescarChat(true); cargarBandeja();
}
let operadoresCargados = false;
async function toggleTransfer() {
  const p = document.getElementById('panelTransfer');
  const abrir = p.style.display === 'none' || !p.style.display;
  p.style.display = abrir ? 'flex' : 'none';
  if (abrir && !operadoresCargados) {
    const d = await (await fetch('/atencion/api/operadores')).json();
    document.getElementById('selOperador').innerHTML = (d.operadores || [])
      .filter(o => o.id !== YO).map(o => `<option value="${o.id}">${esc(o.nombre)} (${esc(o.rol)})</option>`).join('');
    operadoresCargados = true;
  }
}
async function confirmarTransfer() {
  if (!convAbierta) return;
  const operador_id = parseInt(document.getElementById('selOperador').value, 10);
  if (!operador_id) { alert('Elegí un operador.'); return; }
  const nota = document.getElementById('notaTransfer').value.trim();
  await fetch(`/atencion/${convAbierta}/transferir`, {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({operador_id, nota})
  });
  document.getElementById('notaTransfer').value = '';
  toggleTransfer(); await refrescarChat(true); cargarBandeja();
}
async function enviar() {
  const inp = document.getElementById('inputMsg');
  const texto = inp.value.trim();
  if (!texto || !convAbierta) return;
  inp.value = '';
  const d = await (await fetch(`/atencion/${convAbierta}/responder`, {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({texto})
  })).json();
  if (!d.enviado) alert('⚠️ El mensaje se guardó pero no se pudo enviar al canal (revisá el token del bot).');
  await refrescarChat(false); cargarBandeja();
}
async function cerrarConv() {
  if (!convAbierta) return;
  await fetch(`/atencion/${convAbierta}/cerrar`, {method: 'POST'});
  convAbierta = null; convData = null;
  vaciarPedido();
  document.getElementById('composer').style.display = 'none';
  document.getElementById('chatAcciones').style.display = 'none';
  document.getElementById('panelTransfer').style.display = 'none';
  document.getElementById('chat').innerHTML = '<div class="muted" style="text-align:center; margin-top:40px; font-size:13px;">Devuelta al bot ✅</div>';
  document.getElementById('chatHeadInner').innerHTML = '<span class="muted" style="font-size:13px;">Elegí una conversación 👈</span>';
  document.getElementById('ficha').innerHTML = '<div class="muted">Abrí una conversación para ver al cliente.</div>';
  cargarBandeja();
}

/* ── Ficha del cliente ── */
let fichaData = null;
async function cargarFicha() {
  if (!convAbierta) { fichaData = null; return; }
  const r = await fetch(`/atencion/api/${convAbierta}/cliente`);
  fichaData = r.ok ? await r.json() : null;
  renderFicha();
}
const INP = 'input';
function renderFicha() {
  const p = document.getElementById('ficha');
  const f = fichaData && fichaData.ficha;
  if (!f) {
    p.innerHTML = `
      <div class="muted" style="margin-bottom:8px; font-size:12px;">Sin cliente vinculado.</div>
      <div style="display:flex; gap:6px; margin-bottom:6px;">
        <input id="buscarCli" placeholder="Buscar nombre o DNI…" autocomplete="off" onkeydown="if(event.key==='Enter')buscarClientes()" class="${INP}" style="flex:1; border-radius:8px; padding:6px 9px; font-size:12px;">
        <button onclick="buscarClientes()" class="hbtn hbtn-info" style="border-radius:8px; padding:6px 9px; font-size:11px; flex-shrink:0;">Buscar</button>
      </div>
      <div id="resultadosCli" style="margin-bottom:14px;"></div>
      <div class="bt" style="border-top:0.5px solid; padding-top:10px;">
        <div class="muted" style="font-size:10px; margin-bottom:6px;">…o crear ficha nueva</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px;">
          <input id="nuevoNombre" placeholder="Nombre" class="${INP}" style="border-radius:8px; padding:6px 9px; font-size:12px;">
          <input id="nuevoApellido" placeholder="Apellido" class="${INP}" style="border-radius:8px; padding:6px 9px; font-size:12px;">
          <input id="nuevoDni" placeholder="DNI" class="${INP}" style="border-radius:8px; padding:6px 9px; font-size:12px;">
          <input id="nuevoDom" placeholder="Domicilio" class="${INP}" style="border-radius:8px; padding:6px 9px; font-size:12px;">
        </div>
        <button onclick="crearCliente()" class="hbtn hbtn-ok" style="border-radius:8px; padding:6px 11px; font-size:12px;">＋ Crear ficha</button>
      </div>`;
    return;
  }
  const ini = (f.nombre || '?').replace(/[^A-Za-zÀ-ÿ ]/g,'').split(/[ ,]+/).filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase() || '?';
  const esLocal = f.fuente === 'local';
  const badge = esLocal
    ? '<span class="tag-blue" style="font-size:9px; padding:2px 7px; border-radius:8px;">lead local</span>'
    : '<span class="tag-green" style="font-size:9px; padding:2px 7px; border-radius:8px;">ObServer</span>';
  const fila = (ic, lab, val) => val ? `
    <div><div class="muted" style="margin-bottom:2px;"><i class="ti ti-${ic}" style="font-size:12px; vertical-align:-1px; margin-right:5px"></i>${lab}</div><div class="txt">${esc(val)}</div></div>` : '';
  p.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:14px;">
      <div style="width:48px; height:48px; border-radius:50%; background:#185FA5; color:#E6F1FB; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; margin-bottom:8px;">${esc(ini)}</div>
      <div class="title" style="font-size:13px; font-weight:600;">${esc(f.nombre)}</div>
      <div style="margin-top:4px;">${badge}</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; font-size:11px;">
      ${fila('id', 'Documento', f.documento ? 'DNI ' + f.documento : '')}
      ${fila('phone', 'Teléfono', f.telefono)}
      ${fila('map-pin', 'Domicilio', f.domicilio)}
    </div>
    <div class="bt" style="margin-top:14px; padding-top:12px; border-top:0.5px solid;">
      <div class="muted" style="font-size:10px; margin-bottom:6px;"><i class="ti ti-alert-triangle" style="font-size:11px; vertical-align:-1px; margin-right:4px"></i>Notas</div>
      <textarea id="fichaNotas" rows="3" class="${INP}" style="width:100%; border-radius:8px; padding:6px 9px; font-size:11px; margin-bottom:6px;">${esc(f.notas || '')}</textarea>
      <div style="display:flex; gap:6px;">
        <button id="btnGuardarFicha" onclick="guardarFicha()" class="hbtn hbtn-ok" style="border-radius:8px; padding:5px 11px; font-size:11px;">Guardar notas</button>
        <button onclick="desvincularCliente()" class="hbtn" style="border-radius:8px; padding:5px 11px; font-size:11px;">Desvincular</button>
      </div>
    </div>`;
}
function _val(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }
async function crearCliente() {
  const datos = {nombre:_val('nuevoNombre'), apellido:_val('nuevoApellido'), dni:_val('nuevoDni'), domicilio:_val('nuevoDom')};
  if (!datos.nombre && !datos.apellido) { alert('Poné al menos nombre o apellido.'); return; }
  await fetch(`/atencion/${convAbierta}/crear-cliente`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(datos)});
  await cargarFicha();
}
async function buscarClientes() {
  const q = document.getElementById('buscarCli').value.trim();
  const d = await (await fetch('/atencion/api/clientes/buscar?q=' + encodeURIComponent(q))).json();
  const box = document.getElementById('resultadosCli');
  const cs = d.clientes || [];
  if (!cs.length) { box.innerHTML = '<div class="muted" style="font-size:11px;">Sin resultados.</div>'; return; }
  box.innerHTML = cs.map(c => `
    <div onclick="vincularCliente(${c.observer_id})" class="conv" style="padding:6px 8px; border-bottom:0.5px solid;">
      <span class="txt" style="font-size:12px;">${esc(c.nombre)}</span>
      <span class="muted" style="font-size:10px;"> ${esc(String(c.documento || ''))}${c.telefono ? ' · ' + esc(c.telefono) : ''}</span>
    </div>`).join('');
}
async function vincularCliente(oid) {
  await fetch(`/atencion/${convAbierta}/vincular-cliente`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({observer_id: oid})});
  await cargarFicha();
}
async function desvincularCliente() {
  await fetch(`/atencion/${convAbierta}/desvincular-cliente`, {method:'POST'});
  await cargarFicha();
}
async function guardarFicha() {
  if (!convAbierta) return;
  const notas = document.getElementById('fichaNotas').value;
  await fetch(`/atencion/${convAbierta}/ficha-notas`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({notas})});
  const b = document.getElementById('btnGuardarFicha');
  if (b) { b.textContent = 'Guardado ✓'; setTimeout(() => { b.textContent = 'Guardar notas'; }, 1500); }
  cargarFicha();
}

/* ── Buscador de productos ── */
let prodTimer = null;
function fmtPrecio(n) { return (n == null) ? 's/precio' : '$' + Math.round(n).toLocaleString('es-AR'); }

function toggleBuscador() {
  const pop = document.getElementById('searchPop');
  const abrir = pop.style.display === 'none' || !pop.style.display;
  pop.style.display = abrir ? 'block' : 'none';
  if (abrir) { document.getElementById('prodQuery').focus(); }
}
function onProdInput() { clearTimeout(prodTimer); prodTimer = setTimeout(buscarProductos, 250); }

async function buscarProductos() {
  const q = document.getElementById('prodQuery').value.trim();
  const box = document.getElementById('prodResultados');
  const cnt = document.getElementById('prodCount');
  if (q.length < 2) { box.innerHTML = ''; cnt.textContent = ''; return; }
  const d = await (await fetch('/atencion/api/productos/buscar?q=' + encodeURIComponent(q))).json();
  const ps = d.productos || [];
  cnt.textContent = ps.length ? ps.length + ' resultado' + (ps.length > 1 ? 's' : '') : 'sin resultados';
  box.innerHTML = ps.map(rowProducto).join('') ||
    '<div class="muted" style="padding:10px 12px; font-size:11px;">Sin resultados.</div>';
}

function rowProducto(p) {
  const sin = p.nivel === 'none';
  const dotCol = p.nivel === 'ok' ? '#1D9E75' : p.nivel === 'low' ? 'var(--busy)' : 'var(--away)';
  const stockTxt = p.nivel === 'ok' ? `En stock · ${p.stock} u.`
                 : p.nivel === 'low' ? `Últimas ${p.stock} u.` : 'Sin stock';
  const stockCls = sin ? 'muted2' : (p.nivel === 'low' ? 'busy-txt' : 'accent-txt');
  const rx = p.receta
    ? '<span class="rx" style="font-size:8px; padding:2px 6px; border-radius:8px; display:inline-flex; align-items:center; gap:3px;"><i class="ti ti-prescription" style="font-size:9px"></i>Receta</span>'
    : '';
  const sub = [esc(p.droga), esc(p.presentacion)].filter(Boolean).join(' · ');
  const arg = encodeURIComponent(JSON.stringify({n: p.nombre, pr: p.precio, s: sub}));
  const plus = sin ? ''
    : `<div class="card-ic" onclick="agregarProductoEnc('${arg}')" title="Agregar al pedido" style="width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; margin-top:4px; margin-left:auto; cursor:pointer;"><i class="ti ti-plus" style="font-size:13px"></i></div>`;
  return `
    <div class="sp-row" style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:0.5px solid; ${sin ? 'opacity:0.5;' : ''}">
      <div style="flex:1; min-width:0;">
        <div style="display:flex; align-items:center; gap:6px;">
          <span class="title" style="font-size:12px;">${esc(p.nombre)}</span> ${rx}
        </div>
        ${sub ? `<div class="muted" style="font-size:10px; margin-top:1px;">${sub}</div>` : ''}
        <div style="display:flex; align-items:center; gap:5px; margin-top:3px;">
          <span style="width:5px; height:5px; border-radius:50%; background:${dotCol};"></span>
          <span class="${stockCls}" style="font-size:9px; color:${p.nivel === 'low' ? 'var(--busytx)' : ''};">${stockTxt}</span>
        </div>
      </div>
      <div style="text-align:right; flex-shrink:0;">
        <div class="${sin ? 'muted2' : 'title'}" style="font-size:12px;">${fmtPrecio(p.precio)}</div>
        ${plus}
      </div>
    </div>`;
}

/* ── Detalle del pedido (Fase C) ── */
let pedido = [];
const _kprod = n => (n || '').trim().toLowerCase();

function agregarProductoEnc(enc) {
  const o = JSON.parse(decodeURIComponent(enc));
  agregarProducto(o.n, o.pr, o.s);
}
function agregarProducto(nombre, precio, sub) {
  const it = pedido.find(x => _kprod(x.nombre) === _kprod(nombre));
  if (it) it.cant++;
  else pedido.push({nombre, precio: precio || 0, sub: sub || '', cant: 1});
  renderPedido();
}
function cambiarCant(i, d) {
  if (!pedido[i]) return;
  pedido[i].cant += d;
  if (pedido[i].cant <= 0) pedido.splice(i, 1);
  renderPedido();
}
function vaciarPedido() { pedido = []; renderPedido(); }

function renderPedido() {
  const card = document.getElementById('pedidoCard');
  if (!pedido.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  const total = pedido.reduce((s, it) => s + it.precio * it.cant, 0);
  const qb = 'width:18px; height:18px; border-radius:5px; display:inline-flex; align-items:center; justify-content:center;';
  document.getElementById('pedidoRows').innerHTML = pedido.map((it, i) => `
    <div class="row" style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:0.5px solid;">
      <div style="flex:1; min-width:0;">
        <div class="title" style="font-size:12px;">${esc(it.nombre)}</div>
        ${it.sub ? `<div class="muted" style="font-size:10px;">${esc(it.sub)}</div>` : ''}
      </div>
      <div style="display:flex; align-items:center; gap:7px; margin-left:8px;">
        <div style="display:flex; align-items:center; gap:5px;">
          <span class="qbtn-m" onclick="cambiarCant(${i},-1)" style="${qb}"><i class="ti ti-minus" style="font-size:11px"></i></span>
          <span class="txt" style="font-size:11px; min-width:12px; text-align:center;">${it.cant}</span>
          <span class="qbtn-p" onclick="cambiarCant(${i},1)" style="${qb}"><i class="ti ti-plus" style="font-size:11px"></i></span>
        </div>
        <div class="title" style="font-size:12px; min-width:54px; text-align:right;">${fmtPrecio(it.precio * it.cant)}</div>
      </div>
    </div>`).join('');
  document.getElementById('pedidoTotal').textContent = fmtPrecio(total);
}

async function enviarPedido() {
  if (!pedido.length || !convAbierta) return;
  const lineas = pedido.map(it => `• ${it.nombre} x${it.cant} — ${fmtPrecio(it.precio * it.cant)}`);
  const total = pedido.reduce((s, it) => s + it.precio * it.cant, 0);
  const texto = '🧾 Detalle de tu pedido:\n' + lineas.join('\n') + '\nTotal: ' + fmtPrecio(total) +
                '\n\n(El pago y la entrega se coordinan por fuera.)';
  const d = await (await fetch(`/atencion/${convAbierta}/responder`, {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({texto})
  })).json();
  if (!d.enviado) alert('⚠️ No se pudo enviar al canal (revisá el token del bot).');
  vaciarPedido();
  await refrescarChat(false); cargarBandeja();
}

function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

setVista('sin_asignar');
cargarBandeja();
setInterval(cargarBandeja, 5000);
setInterval(() => refrescarChat(false), 4000);
</script>
