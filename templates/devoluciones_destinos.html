{% extends 'base.html' %}
{% block title %}Destinos de devolución{% endblock %}
{% block main %}
<div class="max-w-3xl mx-auto p-4 space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">Destinos de devolución</h1>
    <a href="{{ url_for('devoluciones_list') }}" class="px-3 py-1.5 rounded border border-gray-300 hover:bg-white text-sm">← Devoluciones</a>
  </div>

  <form method="post" class="bg-white rounded-lg shadow-sm border border-gray-200 p-3 flex gap-2">
    <input name="nombre" required autofocus placeholder="Ej: Vendedor original, Cobranzas, Auditoría..."
           class="flex-1 border border-gray-300 rounded px-2 py-1.5 text-sm" />
    <button type="submit" class="bg-brand hover:bg-brand-hover text-white px-4 py-1.5 rounded text-sm font-semibold">
      + Agregar
    </button>
  </form>

  <div class="bg-white rounded-lg shadow-sm border border-gray-200">
    <table class="w-full text-sm">
      <thead>
        <tr><th class="px-3 py-2 text-left">Nombre</th><th class="px-3 py-2 w-32">Estado</th><th class="px-3 py-2 w-32"></th></tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        {% for d in destinos %}
        <tr class="{% if not d.activo %}opacity-60{% endif %}">
          <td class="px-3 py-2">{{ d.nombre }}</td>
          <td class="px-3 py-2 text-xs">
            <form method="post" action="{{ url_for('devoluciones_destino_toggle', id=d.id) }}">
              <button type="submit" class="px-2 py-0.5 rounded text-xs {% if d.activo %}bg-green-100 text-green-800{% else %}bg-gray-200 text-gray-600{% endif %}">
                {{ 'activo' if d.activo else 'inactivo' }}
              </button>
            </form>
          </td>
          <td class="px-3 py-2 text-right">
            <form method="post" action="{{ url_for('devoluciones_destino_eliminar', id=d.id) }}"
                  onsubmit="return confirm('¿Eliminar destino {{ d.nombre }}?')" class="inline">
              <button type="submit" class="text-red-500 hover:text-red-700 text-xs">✕</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="3" class="px-4 py-6 text-center text-gray-500 text-sm">Sin destinos cargados.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
