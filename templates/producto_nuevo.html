{% extends "base.html" %}
{% set nav_active = "productos" %}
{% block title %}Nuevo producto{% endblock %}

{% block main %}
<div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white border border-surface-border rounded-xl shadow-sm p-8 w-full max-w-md">
        <h1 class="text-lg font-bold text-[#1e1e1e] mb-1">Nuevo producto</h1>
        <p class="text-sm text-[#888] mb-6">Ingresá el EAN/código de barra para crear el producto y acceder a la ficha completa.</p>
        <form method="POST" action="{{ url_for('producto_nuevo') }}" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-[#555] mb-1">EAN / Código de barra <span class="text-red-600">*</span></label>
                <input type="text" name="ean" required autofocus
                       class="w-full border border-[#ddd] rounded px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-sky-400"
                       placeholder="7791234567890">
            </div>
            <div>
                <label class="block text-xs font-semibold text-[#555] mb-1">Descripción</label>
                <input type="text" name="desc" value="{{ desc or '' }}"
                       class="w-full border border-[#ddd] rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"
                       placeholder="ALERTIAL 120 MG CPR X 10">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 bg-sky-600 hover:bg-sky-700 text-white font-semibold text-sm px-4 py-2 rounded transition-colors">
                    Crear y abrir ficha →
                </button>
                <button type="button" onclick="window.close()"
                        class="text-sm text-[#888] hover:text-[#555] px-4 py-2 rounded border border-[#ddd] hover:bg-[#f3f4f6] transition-colors">
                    Cerrar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
