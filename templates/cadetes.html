<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadetes · Badia</title>
<style>
  :root {
    --bg:#22222d; --surface:#2c2c39; --card:#272732; --txt:#ececf0; --title:#fafafc;
    --muted:#9c9ca4; --border:rgba(255,255,255,0.14); --accent:#1D9E75; --accent-ink:#06241a;
    --row-bd:rgba(255,255,255,0.10); --hov:#3a3a47;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--txt); font-family:var(--font); }
  .topbar { height:54px; background:var(--surface); border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:14px; padding:0 18px; }
  .logo { font-weight:800; font-size:15px; display:flex; align-items:center; gap:8px; }
  .logo .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  .hbtn { font-size:12px; padding:6px 11px; border-radius:8px; border:1px solid var(--border); background:var(--hov); color:var(--txt); cursor:pointer; }
  .hbtn-ok { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }
  .hbtn-danger { background:transparent; color:#F09595; border-color:#5a2a2a; font-size:10px; padding:3px 8px; }
  .input { background:var(--hov); color:var(--txt); border:1px solid var(--border); border-radius:8px; padding:6px 9px; font-size:13px; }
  .wrap { max-width:820px; margin:0 auto; padding:18px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--muted); font-weight:600; padding:7px 6px; border-bottom:1px solid var(--border); }
  td { padding:6px; border-bottom:1px solid var(--row-bd); }
  .badge { font-size:10px; padding:2px 8px; border-radius:999px; font-weight:700; background:var(--hov); color:var(--muted); }
  .muted { color:var(--muted); }
  a.link { color:#7fb0e0; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><span class="dot"></span>🧑‍🦽 Cadetes · Badia</div>
    <div style="flex:1"></div>
    <a href="/rutas" class="hbtn">🚚 Rutas</a>
    <a href="/reparto" class="hbtn hbtn-ok">Armar reparto →</a>
    <a href="{{ url_for('auth_logout') }}" class="hbtn">Salir</a>
  </div>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 4px; font-size:15px; color:var(--title);">Cadetes (repartidores)</h2>
      <div class="muted" style="font-size:11px; margin-bottom:12px;">
        Cada cadete puede cubrir varias zonas (se asignan en <a class="link" href="/rutas">Rutas</a>).
        La tarifa por jornada se usa para los pagos.
      </div>
      <table>
        <thead><tr><th>Nombre</th><th>Teléfono</th><th title="Telegram user_id — se autocompleta al primer TOMAR si el nombre coincide; sino cargalo a mano para que el bot pueda enviarle DMs">TG&nbsp;ID</th><th>Tarifa/día</th><th>Zonas</th><th>Activo</th><th>Link</th><th></th></tr></thead>
        <tbody id="tb"></tbody>
      </table>
      <div style="display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;">
        <input id="nNombre" class="input" placeholder="Nombre" style="flex:1; min-width:120px;">
        <input id="nTel" class="input" placeholder="Teléfono" style="width:140px;">
        <input id="nTarifa" class="input" type="number" step="0.01" placeholder="Tarifa/día" style="width:110px;">
        <button onclick="addCadete()" class="hbtn hbtn-ok">+ Agregar</button>
      </div>
    </div>
  </div>
<script>
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function jpost(u,b){ return (await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})})).json(); }
async function cargar(){
  const d = await (await fetch('/cadetes/api')).json();
  window._cad = {}; (d.cadetes||[]).forEach(c=>window._cad[c.id]=c);
  document.getElementById('tb').innerHTML = (d.cadetes||[]).map(c=>`
    <tr>
      <td><input class="input" value="${esc(c.nombre)}" onchange="save(${c.id},'nombre',this.value)" style="width:160px;"></td>
      <td><input class="input" value="${esc(c.telefono)}" placeholder="—" onchange="save(${c.id},'telefono',this.value)" style="width:140px;"></td>
      <td><input class="input" value="${c.telegram_user_id!=null?c.telegram_user_id:''}" placeholder="—" onchange="save(${c.id},'telegram_user_id',this.value)" style="width:120px;" title="Telegram user_id (numérico)"></td>
      <td><input class="input" type="number" step="0.01" value="${c.tarifa_dia!=null?c.tarifa_dia:''}" placeholder="—" onchange="save(${c.id},'tarifa_dia',this.value)" style="width:100px;"></td>
      <td>${c.zonas?`<span class="badge" style="background:var(--accent);color:var(--accent-ink);">${c.zonas} zona${c.zonas>1?'s':''}</span>`:'<span class="muted">—</span>'}</td>
      <td><input type="checkbox" ${c.activo?'checked':''} onchange="save(${c.id},'activo',this.checked)"></td>
      <td>${c.token ? `<button class="hbtn" onclick="copiarLink('${c.token}')">🔗 Link</button>` : '<span class="muted">—</span>'}</td>
      <td><button class="hbtn hbtn-danger" onclick="delCadete(${c.id})">Quitar</button></td>
    </tr>`).join('') || '<tr><td colspan="8" class="muted">Sin cadetes.</td></tr>';
}
async function save(id, campo, val){
  await jpost('/cadetes', {id, [campo]:val});
  cargar();
}
async function addCadete(){
  const nombre = document.getElementById('nNombre').value.trim(); if(!nombre){ alert('Falta el nombre'); return; }
  await jpost('/cadetes', {nombre,
                           telefono:document.getElementById('nTel').value.trim(),
                           tarifa_dia:document.getElementById('nTarifa').value});
  document.getElementById('nNombre').value=''; document.getElementById('nTel').value='';
  document.getElementById('nTarifa').value=''; cargar();
}
function copiarLink(token) {
  const url = `${location.origin}/reparto/cadete/${token}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('Link copiado: ' + url));
  } else {
    const ta = document.createElement('textarea'); ta.value = url;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('Link copiado: ' + url);
  }
}
async function delCadete(id){
  if(confirm('¿Quitar cadete? Se desasigna de sus zonas (no se borran las rutas).')){
    await jpost(`/cadetes/${id}/delete`); cargar();
  }
}
cargar();
</script>
</body>
</html>
