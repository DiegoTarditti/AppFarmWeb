<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armar reparto · Badia</title>
<style>
  :root {
    --bg:#14141a; --surface:#1a1a22; --card:#16161d; --txt:#e0e0e6; --title:#f0f0f3;
    --muted:#8a8a92; --muted2:#6a6a72; --border:rgba(255,255,255,0.08); --accent:#1D9E75;
    --accent-ink:#06241a; --row-bd:rgba(255,255,255,0.06); --hov:#23232d; --warn:#EF9F27;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--txt); font-family:var(--font); }
  .topbar { height:54px; background:var(--surface); border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px; padding:0 18px; flex-wrap:wrap; }
  .logo { font-weight:800; font-size:15px; display:flex; align-items:center; gap:8px; }
  .logo .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  .hbtn { font-size:12px; padding:6px 11px; border-radius:8px; border:1px solid var(--border); background:var(--hov); color:var(--txt); cursor:pointer; text-decoration:none; }
  .hbtn-ok { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }
  .hbtn-danger { background:transparent; color:#F09595; border-color:#5a2a2a; font-size:10px; padding:2px 7px; }
  .input { background:var(--hov); color:var(--txt); border:1px solid var(--border); border-radius:8px; padding:7px 9px; font-size:13px; }
  .wrap { padding:16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:16px; }
  .muted { color:var(--muted); } .muted2 { color:var(--muted2); }
  .cols { display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; align-items:flex-start; }
  .col { background:var(--card); border:1px solid var(--border); border-radius:14px; min-width:240px; max-width:280px; flex:0 0 auto; display:flex; flex-direction:column; max-height:72vh; }
  .col-head { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .dotc { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .col-body { padding:8px; overflow-y:auto; display:flex; flex-direction:column; gap:7px; }
  .ped { border:1px solid var(--row-bd); border-radius:10px; padding:8px 9px; font-size:12px; }
  .ped.entregado { opacity:.5; }
  .ped.urg { border-left:3px solid #DC2626; }
  .badge { font-size:9px; padding:1px 7px; border-radius:999px; font-weight:700; background:var(--hov); color:var(--muted); }
  .res { background:var(--card); border:1px solid var(--border); border-radius:8px; margin-top:4px; max-height:160px; overflow:auto; }
  .res .it { padding:6px 9px; cursor:pointer; font-size:12px; border-bottom:1px solid var(--row-bd); }
  .res .it:hover { background:var(--hov); }
  a.link { color:#7fb0e0; }
  #map { height:62vh; border-radius:14px; border:1px solid var(--border); }
  .leaflet-popup-content { color:#1a1a1a; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; display:none; align-items:center; justify-content:center; }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="logo"><span class="dot"></span>🚚 Armar reparto · Badia</div>
    <div style="flex:1"></div>
    <label class="muted" style="font-size:12px;">Día <input type="date" id="fecha" class="input" onchange="cargar()"></label>
    <button onclick="toggleMapa()" class="hbtn" id="btnMapa">🗺️ Mapa</button>
    <a href="/rutas" class="hbtn">Definir rutas</a>
    <a href="/reparto/planilla" class="hbtn">📋 Planilla</a>
    <a href="{{ url_for('auth_logout') }}" class="hbtn">Salir</a>
  </div>

  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 10px; font-size:14px; color:var(--title);">Agregar pedido</h2>
      <div style="display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
        <label class="muted" style="font-size:11px; flex:2; min-width:200px; display:flex; flex-direction:column; gap:3px;">
          Cliente
          <div style="display:flex; gap:5px;">
            <input id="pCliente" class="input" placeholder="Nombre del cliente" style="flex:1;" oninput="window._oid=null;window._cid=null">
            <button onclick="buscarCli()" class="hbtn" style="flex-shrink:0;">🔎</button>
            <button onclick="abrirNuevoCliente()" class="hbtn" title="＋ Nuevo cliente" style="flex-shrink:0; font-size:14px; padding:5px 9px;">＋</button>
            <button id="btnEditarCli" class="hbtn" title="Editar datos" style="display:none; flex-shrink:0; font-size:14px; padding:5px 9px;" onclick="abrirEditarCliente(window._cid, window._oid)">✏️</button>
          </div>
        </label>
        <label class="muted" style="font-size:11px; flex:3; min-width:240px; display:flex; flex-direction:column; gap:3px;">
          Dirección
          <input id="pDir" class="input" placeholder="ej: Av. Córdoba 3400, Rosario" style="width:100%;">
        </label>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end;">
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Domicilio guardado
          <select id="pDom" class="input" style="width:170px;"><option value="">— escribir dirección —</option></select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Ciudad
          <select id="pCiudad" class="input" style="width:130px;"></select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Prioridad
          <select id="pPrio" class="input" style="width:130px;">
            <option value="normal">🟢 Normal</option>
            <option value="urgente">🔴 Urgente</option>
            <option value="programado">🕐 Programado</option>
          </select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Nota
          <input id="pNota" class="input" placeholder="ítems / referencia" style="width:150px;">
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Canal
          <select id="pCanal" class="input" style="width:120px;">
            <option value="manual">Manual</option>
            <option value="telefono">Teléfono</option>
            <option value="chat">Chat</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="mostrador">Mostrador</option>
          </select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Turno
          <select id="pTurno" class="input" style="width:100px;">
            <option value="">—</option>
            <option value="mañana">Mañana</option>
            <option value="tarde">Tarde</option>
          </select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          TOMO
          <select id="pTomo" class="input" style="width:140px;">
            <option value="">— Tomó —</option>
          </select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Importe $
          <input id="pImporte" class="input" placeholder="0.00" style="width:90px;" type="number" step="0.01" min="0">
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Forma de pago
          <select id="pFormaPago" class="input" style="width:115px;">
            <option value="">—</option>
            <option value="efectivo">Efectivo</option>
            <option value="transfer">Transfer</option>
            <option value="link">Link</option>
            <option value="sc">SC</option>
            <option value="debito">Débito</option>
            <option value="credito">Crédito</option>
          </select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Vuelto
          <input id="pVuelto" class="input" placeholder="NO HAY PLATA / $" style="width:130px;">
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Producto
          <input id="pProducto" class="input" placeholder="lo que lleva" style="width:130px;">
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Cadete
          <select id="pCadete" class="input" style="width:140px;">
            <option value="">(heredar de ruta)</option>
          </select>
        </label>
        <label class="muted" style="font-size:11px; display:flex; flex-direction:column; gap:2px;">
          Observación
          <input id="pObservacion" class="input" placeholder="recetas 3, TRAER PANTUS..." style="width:200px;" onkeydown="if(event.key==='Enter')agregar()">
        </label>
        <label style="font-size:11px; display:flex; align-items:center; gap:4px; height:35px;">
          <input type="checkbox" id="pReceta"> Receta
        </label>
        <label style="font-size:11px; display:flex; align-items:center; gap:4px; height:35px;">
          <input type="checkbox" id="pPagado"> Pagado
        </label>
        <button onclick="agregar()" class="hbtn hbtn-ok" style="padding:9px 16px; height:35px;">Agregar</button>
      </div>
      <div id="resCli" class="res" style="display:none;"></div>
      <div class="muted" id="avisoCfg" style="font-size:11px; margin-top:8px;"></div>
    </div>
    <div id="bannerUrg" style="display:none; background:#3a1414; border:1px solid #5a2a2a; color:#F09595; border-radius:10px; padding:8px 12px; margin-bottom:14px; font-size:13px;"></div>

    <div id="modalNuevo" class="modal-overlay">
      <div class="card" style="width:360px; max-width:90vw; max-height:90vh; overflow:auto;">
        <h3 style="margin:0 0 10px; font-size:14px; color:var(--title);">＋ Nuevo cliente</h3>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <input id="ncNombre" class="input" placeholder="Nombre">
          <input id="ncApellido" class="input" placeholder="Apellido">
          <input id="ncDni" class="input" placeholder="DNI">
          <input id="ncTel" class="input" placeholder="Teléfono">
          <input id="ncDom" class="input" placeholder="Domicilio">
          <select id="ncCiudad" class="input"></select>
        </div>
        <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end;">
          <button class="hbtn" onclick="cerrarModal('modalNuevo')">Cancelar</button>
          <button class="hbtn hbtn-ok" onclick="guardarNuevoCliente()">Guardar</button>
        </div>
      </div>
    </div>

    <div id="modalEditar" class="modal-overlay">
      <div class="card" style="width:400px; max-width:90vw; max-height:90vh; overflow:auto;">
        <h3 style="margin:0 0 10px; font-size:14px; color:var(--title);">✏️ Editar datos del cliente</h3>
        <div id="edObsRef" class="muted2" style="font-size:11px; margin-bottom:8px;"></div>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <input id="edNombre" class="input" placeholder="Nombre">
          <input id="edApellido" class="input" placeholder="Apellido">
          <input id="edDni" class="input" placeholder="DNI">
          <input id="edTel" class="input" placeholder="Teléfono">
          <input id="edDom" class="input" placeholder="Domicilio">
          <input id="edCiudad" class="input" placeholder="Ciudad">
        </div>
        <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end;">
          <button class="hbtn" onclick="cerrarModal('modalEditar')">Cancelar</button>
          <button class="hbtn hbtn-ok" onclick="guardarEditarCliente()">Guardar</button>
        </div>
      </div>
    </div>

    <div id="mapwrap" style="display:none;"><div id="map"></div></div>
    <div class="cols" id="cols"><div class="muted">Cargando…</div></div>
  </div>

<script>
const CUAD = {N:'Norte', S:'Sur', E:'Este', O:'Oeste'};
window._oid = null;
window._cid = null;
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&','<':'<','>':'>','"':'"'}[c])); }
async function jpost(u,b){ return (await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})})).json(); }
function hoyISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fechaVal(){ return document.getElementById('fecha').value || hoyISO(); }

async function cargar(){
  const d = await (await fetch('/reparto/api?fecha='+fechaVal())).json();
  window._data = d;
  window._rutas = d.rutas||[];
  const peds = d.pedidos||[];
  const PR = {urgente:0, normal:1, programado:2};
  const urgSin = peds.filter(p=>p.prioridad==='urgente' && !p.ruta_id && p.estado!=='entregado').length;
  const banner = document.getElementById('bannerUrg');
  banner.style.display = urgSin?'block':'none';
  banner.textContent = urgSin?`⚠️ ${urgSin} pedido(s) URGENTE(s) sin asignar a una ruta.`:'';
  const selC = document.getElementById('pCiudad');
  if(selC && !selC._filled){
    selC.innerHTML = (d.ciudades||['Rosario']).map(c=>`<option ${c==='Rosario'?'selected':''}>${esc(c)}</option>`).join('');
    selC._filled = true;
  }
  if(d.cadetes){
    const selCad = document.getElementById('pCadete');
    selCad.innerHTML = '<option value="">(heredar de ruta)</option>' + d.cadetes.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
  }
  if(d.usuarios){
    const selTomo = document.getElementById('pTomo');
    selTomo.innerHTML = '<option value="">— Tomó —</option>' + d.usuarios.map(u=>`<option value="${esc(u.nombre)}">${esc(u.nombre)}</option>`).join('');
  }
  const optRutas = '<option value="">(sin asignar)</option>' + window._rutas.map(r=>`<option value="${r.id}">${esc(r.nombre)}</option>`).join('');
  const grupos = [{id:null, nombre:'Sin asignar', color:'#6a6a72'}].concat(window._rutas);
  document.getElementById('cols').innerHTML = grupos.map(g=>{
    const items = peds.filter(p=> (p.ruta_id||null) === (g.id||null))
      .sort((a,b)=> (PR[a.prioridad]??1)-(PR[b.prioridad]??1) || (a.orden||999)-(b.orden||999));
    const filas = items.map(p=>pedCard(p, optRutas)).join('') || '<div class="muted2" style="font-size:11px; padding:6px;">—</div>';
    const exp = g.id ? `<button class="hbtn" style="font-size:10px;padding:3px 7px;" onclick="optimizar(${g.id})" title="Optimizar">Optimizar</button> <button class="hbtn" style="font-size:10px;padding:3px 7px;" onclick="exportar(${g.id})">Exportar</button>` : '';
    const cad = g.cadete ? `<span class="muted2" style="font-size:10px;">· ${esc(g.cadete)}</span>` : '';
    return `<div class="col">
      <div class="col-head">
        <span class="dotc" style="background:${esc(g.color||'#6a6a72')}"></span>
        <b style="font-size:12px;">${esc(g.nombre)}</b> <span class="muted2" style="font-size:11px;">(${items.length})</span> ${cad}
        <div style="flex:1"></div>${exp}
      </div>
      <div class="col-body">${filas}</div>
    </div>`;
  }).join('');
  if(document.getElementById('mapwrap').style.display!=='none') renderMapa();
}

let _map=null, _layer=null;
function toggleMapa(){
  const w=document.getElementById('mapwrap'), cols=document.getElementById('cols');
  const show = w.style.display==='none';
  w.style.display = show?'block':'none';
  cols.style.display = show?'none':'flex';
  document.getElementById('btnMapa').textContent = show?'📋 Listas':'🗺️ Mapa';
  if(show){ if(!_map) initMapa(); setTimeout(()=>{ _map.invalidateSize(); renderMapa(); },60); }
}
function initMapa(){
  _map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(_map);
  _layer = L.layerGroup().addTo(_map);
  _map.setView([-32.95,-60.66], 12);
}
function renderMapa(){
  if(!_map || !window._data) return;
  _layer.clearLayers();
  const d=window._data, f=d.farmacia||{}, pts=[];
  const rById={}; (d.rutas||[]).forEach(r=>rById[r.id]=r);
  (d.rutas||[]).forEach(r=>{
    if(r.poligono && r.poligono.length>=3){
      L.polygon(r.poligono, {color:r.color||'#6a6a72', weight:2, fillOpacity:.08})
        .addTo(_layer).bindPopup('Zona: '+esc(r.nombre));
      r.poligono.forEach(c=>pts.push(c));
    }
  });
  if(f.lat!=null){ L.marker([f.lat,f.lng]).addTo(_layer).bindPopup('🏥 Farmacia'); pts.push([f.lat,f.lng]); }
  (d.pedidos||[]).forEach(p=>{
    if(p.lat==null||p.lng==null) return;
    const color=(rById[p.ruta_id]||{}).color||'#6a6a72';
    L.circleMarker([p.lat,p.lng],{radius:7,color:'#fff',weight:1,fillColor:color,fillOpacity:.9})
      .addTo(_layer).bindPopup(`<b>${esc(p.cliente_nombre)}</b><br>${esc(p.direccion)}${p.orden?'<br>parada #'+p.orden:''}`);
    pts.push([p.lat,p.lng]);
  });
  (d.rutas||[]).forEach(r=>{
    const ps=(d.pedidos||[]).filter(p=>p.ruta_id===r.id && p.lat!=null && p.orden).sort((a,b)=>a.orden-b.orden);
    if(ps.length){ const line=f.lat!=null?[[f.lat,f.lng]]:[]; ps.forEach(p=>line.push([p.lat,p.lng]));
      L.polyline(line,{color:r.color||'#6a6a72',weight:2.5,opacity:.6}).addTo(_layer); }
  });
  if(pts.length) _map.fitBounds(pts, {padding:[30,30]});
}
async function optimizar(rid){ await jpost(`/reparto/ruta/${rid}/optimizar`, {fecha:fechaVal()}); cargar(); }

function pedCard(p, optRutas){
  const ent = p.estado==='entregado';
  const urg = p.prioridad==='urgente';
  const bprio = urg ? '<span class="badge" style="background:#DC2626;color:#fff;">🔴 Urgente</span>'
              : (p.prioridad==='programado' ? '<span class="badge" style="background:#185FA5;color:#fff;">🕐 Prog.</span>' : '');
  const bcuad = p.cuadrante ? `<span class="badge">${esc(CUAD[p.cuadrante]||p.cuadrante)}</span>` : '<span class="badge" style="background:#5a2a2a;color:#F09595;">s/ubicar</span>';
  const bcob = p.importe != null ? `$ ${Number(p.importe).toFixed(2)}` : '';
  const bform = p.forma_pago ? esc(p.forma_pago) : '';
  const bpag = p.pagado ? '<span class="badge" style="background:var(--accent);color:var(--accent-ink);">✓ Pagado</span>' : '';
  const bvuelto = p.vuelto ? `<span class="muted2" style="font-size:10px;">↩ ${esc(p.vuelto)}</span>` : '';
  const bturno = p.turno ? `<span class="badge">${esc(p.turno)}</span>` : '';
  const btomo = p.tomo ? `<span class="muted2" style="font-size:10px;">👤 ${esc(p.tomo)}</span>` : '';
  const bcanal = p.canal && p.canal!=='manual' ? `<span class="badge" style="background:#2a3a5a;">${esc(p.canal)}</span>` : '';
  const bprod = p.producto ? `<span class="muted2" style="font-size:10px;">📦 ${esc(p.producto)}</span>` : '';
  const breceta = p.requiere_receta ? '<span class="badge" style="background:#5a1a1a;color:#F09595;">📋 Receta</span>' : '';
  const bobs = p.observacion ? `<span class="muted2" style="font-size:10px;">📝 ${esc(p.observacion)}</span>` : '';
  const bnota = p.nota && p.nota!==p.observacion ? `<span class="muted2" style="font-size:10px;">📎 ${esc(p.nota)}</span>` : '';
  const btotal = [bcob, bform, bpag, bvuelto].filter(Boolean).join(' · ');
  return `<div class="ped ${ent?'entregado':''} ${urg?'urg':''}">
    <div style="display:flex; justify-content:space-between; gap:6px;">
      <span>${p.orden?`<span class="badge" style="background:var(--accent);color:var(--accent-ink);">#${p.orden}</span> `:''}<b>${esc(p.cliente_nombre)}</b></span>
      <span style="display:flex; gap:4px; flex-wrap:wrap; align-items:center;">${bprio}${bcuad}${bturno}${bcanal}</span>
    </div>
    <div class="muted" style="margin:2px 0;">${esc(p.direccion)}</div>
    ${btotal ? `<div style="font-size:12px; font-weight:600; margin:2px 0;">${btotal}</div>` : ''}
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin:2px 0;">${btomo}${breceta}${bprod}${bobs}${bnota}</div>
    <div style="display:flex; gap:5px; margin-top:6px; align-items:center;">
      <select class="input" style="flex:1; padding:3px 6px; font-size:11px;" onchange="reasignar(${p.id}, this.value)">
        ${optRutas.replace('value="'+(p.ruta_id||'')+'"', 'value="'+(p.ruta_id||'')+'" selected')}
      </select>
      ${ent? `<button class="hbtn" style="font-size:10px;padding:3px 6px;" onclick="estado(${p.id},'pendiente')">↩</button>`
           : `<button class="hbtn hbtn-ok" style="font-size:10px;padding:3px 6px;" onclick="estado(${p.id},'entregado')">✓</button>`}
      <button class="hbtn hbtn-danger" onclick="delPed(${p.id})">✕</button>
    </div>
  </div>`;
}

async function buscarCli(){
  const q = document.getElementById('pCliente').value.trim(); if(q.length<2) return;
  const d = await (await fetch('/reparto/api/buscar-cliente?q='+encodeURIComponent(q))).json();
  const box = document.getElementById('resCli');
  const cs = d.clientes||[];
  box.style.display = cs.length?'block':'none';
  box.innerHTML = cs.map(c=>{
    const ref = c.cliente_id ? `loc:${c.cliente_id}` : `obs:${c.observer_id}`;
    const doc = c.documento ? ` <span class="muted2">${esc(String(c.documento))}</span>` : '';
    const ciu = c.ciudad ? ` <span class="muted2" style="font-size:10px;">📍${esc(c.ciudad)}</span>` : '';
    const tel = c.telefono ? ` <span class="muted2" style="font-size:10px;">📞${esc(c.telefono)}</span>` : '';
    return `<div class="it" onclick='pickCli(${JSON.stringify(ref)}, ${JSON.stringify(c.nombre)}, ${c.cliente_id||'null'}, ${c.observer_id||'null'})'>${esc(c.nombre)}${doc}${ciu}${tel}</div>`;
  }).join('');
}

async function pickCli(ref, nombre, cid, oid){
  window._oid = oid;
  window._cid = cid;
  document.getElementById('pCliente').value = nombre;
  document.getElementById('resCli').style.display='none';
  const params = cid ? `cliente_id=${cid}` : `observer_id=${oid}`;
  const ficha = await (await fetch(`/reparto/api/cliente?${params}`)).json();
  if(ficha && !ficha.error){
    if(ficha.domicilio) document.getElementById('pDir').value = ficha.domicilio;
    if(ficha.ciudad){
      const sel = document.getElementById('pCiudad');
      for(let i=0;i<sel.options.length;i++){
        if(sel.options[i].value===ficha.ciudad){ sel.selectedIndex=i; break; }
      }
    }
    const doms = ficha.domicilios||[];
    const sel = document.getElementById('pDom');
    sel.innerHTML = '<option value="">— escribir dirección —</option>' +
      doms.map(x=>`<option value="${x.id}">${esc(x.etiqueta)} — ${esc(x.direccion||'ubicación 📍')}</option>`).join('');
    document.getElementById('btnEditarCli').style.display = cid ? 'inline-block' : 'none';
  }
}

function abrirNuevoCliente(){
  document.getElementById('modalNuevo').style.display='flex';
  const sel = document.getElementById('ncCiudad');
  if(!sel._filled){
    fetch('/reparto/api?fecha='+fechaVal()).then(r=>r.json()).then(d=>{
      sel.innerHTML = (d.ciudades||['Rosario']).map(c=>`<option ${c==='Rosario'?'selected':''}>${esc(c)}</option>`).join('');
      sel._filled = true;
    });
  }
}
function cerrarModal(id){ document.getElementById(id).style.display='none'; }

async function guardarNuevoCliente(){
  const body = {
    nombre: document.getElementById('ncNombre').value.trim(),
    apellido: document.getElementById('ncApellido').value.trim(),
    dni: document.getElementById('ncDni').value.trim(),
    telefono: document.getElementById('ncTel').value.trim(),
    domicilio: document.getElementById('ncDom').value.trim(),
    ciudad: document.getElementById('ncCiudad').value || '',
  };
  if(!body.nombre && !body.apellido && !body.dni){ alert('Completá al menos nombre, apellido o DNI.'); return; }
  const d = await jpost('/reparto/cliente', body);
  if(!d.ok){ alert('⚠️ '+(d.error||'no se pudo')); return; }
  window._cid = d.cliente_id;
  document.getElementById('pCliente').value = [body.apellido, body.nombre].filter(Boolean).join(', ') || body.dni;
  if(body.domicilio) document.getElementById('pDir').value = body.domicilio;
  if(body.ciudad){
    const sel = document.getElementById('pCiudad');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value===body.ciudad){ sel.selectedIndex=i; break; }
    }
  }
  document.getElementById('btnEditarCli').style.display = 'inline-block';
  document.getElementById('pDom').innerHTML = '<option value="">— escribir dirección —</option>';
  cerrarModal('modalNuevo');
}

function abrirEditarCliente(cid, oid){
  window._editCid = cid;
  document.getElementById('modalEditar').style.display='flex';
  const params = cid ? `cliente_id=${cid}` : `observer_id=${oid}`;
  fetch(`/reparto/api/cliente?${params}`).then(r=>r.json()).then(f=>{
    document.getElementById('edObsRef').textContent = f.fuente==='observer' ? `Fuente ObServer (ref: ${f.nombre})` : 'Cliente local';
    const r = f.raw || {};
    document.getElementById('edNombre').value = r.nombre || '';
    document.getElementById('edApellido').value = r.apellido || '';
    document.getElementById('edDni').value = r.dni || '';
    document.getElementById('edTel').value = r.telefono || '';
    document.getElementById('edDom').value = r.domicilio || '';
    document.getElementById('edCiudad').value = r.ciudad || '';
  });
}

async function guardarEditarCliente(){
  const cid = window._editCid;
  if(!cid) return;
  const body = {
    nombre: document.getElementById('edNombre').value.trim(),
    apellido: document.getElementById('edApellido').value.trim(),
    dni: document.getElementById('edDni').value.trim(),
    telefono: document.getElementById('edTel').value.trim(),
    domicilio: document.getElementById('edDom').value.trim(),
    ciudad: document.getElementById('edCiudad').value.trim(),
  };
  const d = await jpost(`/reparto/cliente/${cid}`, body);
  if(!d.ok){ alert('⚠️ '+(d.error||'no se pudo')); return; }
  const nombre = [body.apellido, body.nombre].filter(Boolean).join(', ') || body.dni;
  if(nombre) document.getElementById('pCliente').value = nombre;
  cerrarModal('modalEditar');
}

async function agregar(){
  const body = {
    cliente_nombre: document.getElementById('pCliente').value.trim(),
    cliente_id: window._cid || null,
    observer_id: window._oid || null,
    domicilio_id: document.getElementById('pDom').value || null,
    direccion: document.getElementById('pDir').value.trim(),
    localidad: document.getElementById('pCiudad').value,
    nota: document.getElementById('pNota').value.trim(),
    prioridad: document.getElementById('pPrio').value,
    tomo: document.getElementById('pTomo').value.trim(),
    canal: document.getElementById('pCanal').value,
    importe: document.getElementById('pImporte').value || null,
    forma_pago: document.getElementById('pFormaPago').value,
    vuelto: document.getElementById('pVuelto').value.trim(),
    requiere_receta: document.getElementById('pReceta').checked,
    pagado: document.getElementById('pPagado').checked,
    turno: document.getElementById('pTurno').value,
    cadete_id: document.getElementById('pCadete').value || null,
    observacion: document.getElementById('pObservacion').value.trim(),
    producto: document.getElementById('pProducto').value.trim(),
  };
  if(!body.cliente_nombre && !body.direccion && !body.domicilio_id){ alert('Poné cliente o dirección.'); return; }
  const d = await jpost('/reparto/pedido', body);
  if(!d.ok){ alert('⚠️ '+(d.error||'no se pudo')); return; }
  if(!d.asignado){ document.getElementById('avisoCfg').textContent = '⚠️ El último pedido quedó "sin asignar".'; }
  else { document.getElementById('avisoCfg').textContent=''; }
  ['pCliente','pDir','pNota','pImporte','pVuelto','pProducto','pObservacion'].forEach(i=>{
    const el=document.getElementById(i); if(el) el.value='';
  });
  const selTomo = document.getElementById('pTomo');
  if(selTomo) selTomo.selectedIndex = 0;
  document.getElementById('pPrio').value='normal';
  document.getElementById('pDom').innerHTML='<option value="">— escribir dirección —</option>';
  document.getElementById('pCanal').value='manual';
  document.getElementById('pFormaPago').value='';
  document.getElementById('pTurno').value='';
  document.getElementById('pCadete').value='';
  document.getElementById('pReceta').checked=false;
  document.getElementById('pPagado').checked=false;
  document.getElementById('btnEditarCli').style.display='none';
  window._oid=null;
  window._cid=null;
  cargar();
}
async function reasignar(pid, ruta_id){ await jpost(`/reparto/pedido/${pid}/asignar`, {ruta_id: ruta_id||null}); cargar(); }
async function estado(pid, e){ await jpost(`/reparto/pedido/${pid}/estado`, {estado:e}); cargar(); }
async function delPed(pid){ if(confirm('¿Quitar pedido?')){ await jpost(`/reparto/pedido/${pid}/delete`); cargar(); } }
async function exportar(rid){
  const d = await (await fetch(`/reparto/ruta/${rid}/export?fecha=`+fechaVal())).json();
  if(d.link){ window.open(d.link, '_blank'); }
  else { alert('No hay paradas con ubicación para armar el recorrido.'); }
}

document.getElementById('fecha').value = hoyISO();
cargar();
