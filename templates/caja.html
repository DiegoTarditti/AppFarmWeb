<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja · Badia</title>
<style>
  :root {
    --bg:#22222d; --surface:#2c2c39; --card:#272732; --card-bd:#185FA5;
    --txt:#ececf0; --title:#fafafc; --muted:#9c9ca4; --muted2:#7a7a82;
    --border:rgba(255,255,255,0.14); --accent:#1D9E75; --accent-ink:#06241a;
    --row-bd:rgba(255,255,255,0.10); --total:#fafafc; --hov:#3a3a47;
    --warn:#EF9F27; --danger:#DC2626; --info:#185FA5;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--txt); font-family:var(--font); }
  .topbar { height:54px; background:var(--surface); border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:14px; padding:0 18px; }
  .logo { font-weight:800; font-size:15px; display:flex; align-items:center; gap:8px; }
  .logo .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  .hbtn { font-size:12px; padding:6px 11px; border-radius:8px; border:1px solid var(--border);
          background:var(--hov); color:var(--txt); cursor:pointer; }
  .hbtn:hover { filter:brightness(1.12); }
  .hbtn-ok { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }
  .hbtn-warn { background:var(--warn); color:#1a1206; border-color:var(--warn); font-weight:700; }
  .hbtn-danger { background:transparent; color:#F09595; border-color:#5a2a2a; }
  .input { background:var(--hov); color:var(--txt); border:1px solid var(--border); border-radius:8px; padding:6px 9px; font-size:12px; }
  .wrap { max-width:1100px; margin:0 auto; padding:18px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--card-bd); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
  .card.cobrado { border-color:var(--accent); }
  .card-head { padding:10px 13px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
  .badge { font-size:10px; padding:2px 8px; border-radius:999px; font-weight:700; }
  .b-conf { background:var(--warn); color:#1a1206; } .b-cob { background:var(--accent); color:var(--accent-ink); }
  .row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--row-bd); font-size:12px; }
  .muted { color:var(--muted); } .muted2 { color:var(--muted2); }
  .total { font-size:17px; font-weight:700; color:var(--total); }
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50; align-items:center; justify-content:center; }
  .op-pill { font-size:11px; padding:4px 11px; border-radius:999px; border:1px solid var(--border); background:var(--hov); color:var(--muted); cursor:pointer; }
  .op-pill.active { background:var(--info); color:#fff; border-color:var(--info); font-weight:700; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><span class="dot"></span>💵 Caja · Badia</div>
    <div style="flex:1"></div>
    {% if current_user.rol in ('admin', 'dev') %}
    <button onclick="abrirFormas()" class="hbtn">Formas de pago</button>
    {% endif %}
    <label class="muted" style="font-size:12px; display:flex; align-items:center; gap:6px;">
      <input type="checkbox" id="verCerrados" onchange="cargar()"> ver cerrados
    </label>
    <button onclick="exportarCsv()" class="hbtn">⤓ CSV conciliación</button>
    <span class="muted" style="font-size:12px;">{{ current_user.nombre_completo or current_user.username }}</span>
    <a href="{{ url_for('auth_logout') }}" class="hbtn">Salir</a>
  </div>

  <div class="wrap">
    <!-- Pestañas de bandejas. Las 3 primeras son la nueva caja sobre PedidoReparto
         (flujo Cerrar transacción). "Tickets sueltos" mantiene la caja vieja (TicketCaja). -->
    <div id="tabs" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;">
      <button class="op-pill active" data-tab="por_cobrar" onclick="setTab('por_cobrar')">💰 Por cobrar <span id="cnt-por_cobrar" class="muted2">·</span></button>
      <button class="op-pill" data-tab="cadetes"        onclick="setTab('cadetes')">🛵 Cadetes <span id="cnt-cadetes" class="muted2">·</span></button>
      <button class="op-pill" data-tab="drogueria"      onclick="setTab('drogueria')">📦 Droguería <span id="cnt-drogueria" class="muted2">·</span></button>
      <button class="op-pill" data-tab="legacy"         onclick="setTab('legacy')">📜 Tickets sueltos</button>
    </div>

    <!-- 3 bandejas nuevas (PedidoReparto). Render en grid con cards. -->
    <div id="bandeja-por_cobrar" class="grid bandeja"></div>
    <div id="bandeja-cadetes"    class="grid bandeja" style="display:none;"></div>
    <div id="bandeja-drogueria"  class="grid bandeja" style="display:none;"></div>

    <!-- Bandeja legacy (TicketCaja) — mantiene el comportamiento viejo. -->
    <div id="bandeja-legacy" style="display:none;">
      <div id="filtroOps" style="display:none; gap:6px; flex-wrap:wrap; margin-bottom:12px;"></div>
      <div id="tickets" class="grid">
        <div class="muted">Cargando…</div>
      </div>
    </div>
  </div>

  <!-- Modal formas de pago -->
  <div id="modalFormas" class="modal">
    <div class="card" style="width:360px; border-color:var(--border);">
      <div class="card-head"><span class="title" style="font-weight:600;">Formas de pago</span>
        <span onclick="cerrarFormas()" class="muted" style="cursor:pointer;">✕</span></div>
      <div style="padding:12px 13px;">
        <div id="listaFormas" style="margin-bottom:10px;"></div>
        <div style="display:flex; gap:6px;">
          <input id="formaNombre" placeholder="Nueva forma de pago" class="input" style="flex:1;" onkeydown="if(event.key==='Enter')crearForma()">
          <button onclick="crearForma()" class="hbtn hbtn-ok">Agregar</button>
        </div>
      </div>
    </div>
  </div>

<script>
let formas = [];
let todosTickets = [];
let filtroActivo = null;

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(n){ return '$' + Math.round(n||0).toLocaleString('es-AR'); }

async function cargarFormas(){
  formas = (await (await fetch('/caja/api/formas-pago')).json()).formas || [];
  renderFormas();
}
function optsFormas(){ return formas.map(f=>`<option value="${esc(f.nombre)}">${esc(f.nombre)}</option>`).join(''); }

function renderFiltros(ts){
  const ops = [...new Set(ts.map(t=>t.operador).filter(Boolean))].sort();
  const bar = document.getElementById('filtroOps');
  if(ops.length < 2){ bar.style.display='none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = [null, ...ops].map(op => {
    const label = op || 'Todos';
    const active = filtroActivo === op ? 'active' : '';
    return `<button class="op-pill ${active}" onclick="setFiltro(${op ? `'${esc(op)}'` : 'null'})">${esc(label)}</button>`;
  }).join('');
}

function setFiltro(op){
  filtroActivo = op;
  renderTickets();
}

function renderTickets(){
  const ts = filtroActivo ? todosTickets.filter(t=>t.operador===filtroActivo) : todosTickets;
  const box = document.getElementById('tickets');
  if(!ts.length){ box.innerHTML = '<div class="muted">No hay tickets' + (filtroActivo ? ' para este operador' : ' en caja ✨') + '</div>'; return; }
  box.innerHTML = ts.map(ticketCard).join('');
  renderFiltros(todosTickets);
}

async function cargar(){
  const cerr = document.getElementById('verCerrados').checked ? '?cerrados=1' : '';
  todosTickets = (await (await fetch('/caja/api/tickets'+cerr)).json()).tickets || [];
  renderFiltros(todosTickets);
  renderTickets();
}

function ticketCard(t){
  const items = (t.items||[]).map(i=>`
    <div class="row"><span>${esc(i.nombre)} <span class="muted2">x${i.cantidad}</span>
      ${i.detalle?`<div class="muted2" style="font-size:10px;">${esc(i.detalle)}</div>`:''}</span>
      <span>${fmt(i.subtotal)}</span></div>`).join('');
  let badge='', acciones='';
  if(t.estado==='confirmado'){
    badge='<span class="badge b-conf">en caja</span>';
    acciones=`<div style="display:flex; gap:6px; margin-top:8px;">
        <select id="fp-${t.id}" class="input" style="flex:1;">${optsFormas()}</select>
        <button onclick="cobrar(${t.id})" class="hbtn hbtn-ok">Cobrar</button>
      </div>
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button onclick="enviarReparto(${t.id})" class="hbtn" style="flex:1; border-color:#185FA5; color:#7fb0e0;">🛵 Enviar a reparto</button>
        <button onclick="anular(${t.id})" class="hbtn hbtn-danger">Anular</button>
      </div>`;
  } else if(t.estado==='cobrado'){
    badge='<span class="badge b-cob">cobrado</span>';
    acciones=`<div class="muted2" style="font-size:11px; margin-top:6px;">Pagó con <b>${esc(t.forma_pago||'—')}</b> · cobró ${esc(t.cajero||'?')}</div>
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button onclick="entregar(${t.id})" class="hbtn hbtn-warn" style="flex:1;">Marcar entregado</button>
        <button onclick="enviarReparto(${t.id})" class="hbtn" style="border-color:#185FA5; color:#7fb0e0;">🛵 Reparto</button>
      </div>`;
  } else {
    badge=`<span class="badge" style="background:var(--hov); color:var(--muted);">${esc(t.estado)}</span>`;
  }
  return `<div class="card ${t.estado==='cobrado'?'cobrado':''}">
    <div class="card-head"><span class="title" style="font-weight:600; font-size:13px;">${esc(t.cliente)}</span>${badge}</div>
    <div style="padding:8px 13px;">
      ${items}
      <div style="display:flex; justify-content:space-between; align-items:center; padding-top:8px;">
        <span class="muted2" style="font-size:11px;">${esc(t.operador||'')} · ${esc(t.creado_en)}</span>
        <span class="total">${fmt(t.total)}</span>
      </div>
      ${acciones}
    </div>
  </div>`;
}

async function cobrar(id){
  const forma = document.getElementById('fp-'+id).value;
  await fetch(`/caja/${id}/cobrar`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({forma_pago:forma})});
  cargar();
}
async function entregar(id){ await fetch(`/caja/${id}/entregar`, {method:'POST'}); cargar(); }
async function anular(id){ if(confirm('¿Anular este ticket?')){ await fetch(`/caja/${id}/anular`, {method:'POST'}); cargar(); } }
async function enviarReparto(id){
  const r = await (await fetch(`/caja/${id}/enviar-reparto`, {method:'POST'})).json();
  if(r.ok){
    alert('🛵 Pedido de reparto creado' + (r.asignado ? ' y asignado a ruta.' : '.\n(Sin ruta asignada — completar en planilla.)'));
  } else {
    alert('⚠️ ' + (r.error||'error al crear el pedido'));
  }
}

/* Formas de pago (admin) */
function abrirFormas(){ document.getElementById('modalFormas').style.display='flex'; renderFormas(); }
function cerrarFormas(){ document.getElementById('modalFormas').style.display='none'; }
function renderFormas(){
  const box = document.getElementById('listaFormas'); if(!box) return;
  box.innerHTML = formas.length ? formas.map(f=>`
    <div class="row"><span>${esc(f.nombre)}</span>
      <button onclick="eliminarForma(${f.id})" class="hbtn hbtn-danger" style="font-size:10px; padding:2px 7px;">Quitar</button></div>`).join('')
    : '<div class="muted" style="font-size:11px;">Sin formas cargadas.</div>';
}
async function crearForma(){
  const nombre = document.getElementById('formaNombre').value.trim();
  if(!nombre) return;
  const d = await (await fetch('/caja/formas-pago', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nombre})})).json();
  if(!d.ok){ alert('⚠️ '+(d.error||'no se pudo')); return; }
  document.getElementById('formaNombre').value='';
  await cargarFormas();
}
async function eliminarForma(id){ await fetch(`/caja/formas-pago/${id}/delete`, {method:'POST'}); await cargarFormas(); }

function exportarCsv(){
  const hoy = new Date().toISOString().slice(0,10);
  const fecha = prompt('Fecha a exportar (YYYY-MM-DD):', hoy);
  if(fecha) window.location = `/caja/export?fecha=${fecha}`;
}

/* ── Bandejas nuevas (PedidoReparto / flujo Cerrar transacción) ── */
let tabActiva = localStorage.getItem('cajaTab') || 'por_cobrar';
const BANDEJAS = ['por_cobrar', 'cadetes', 'drogueria'];

function setTab(name) {
  tabActiva = name;
  localStorage.setItem('cajaTab', name);
  document.querySelectorAll('#tabs .op-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  document.getElementById('bandeja-por_cobrar').style.display = name === 'por_cobrar' ? 'grid' : 'none';
  document.getElementById('bandeja-cadetes').style.display    = name === 'cadetes'    ? 'grid' : 'none';
  document.getElementById('bandeja-drogueria').style.display  = name === 'drogueria'  ? 'grid' : 'none';
  document.getElementById('bandeja-legacy').style.display     = name === 'legacy'     ? 'block': 'none';
  if (BANDEJAS.includes(name)) cargarBandeja(name);
  else cargar();   // legacy
}

async function cargarBandeja(name) {
  const box = document.getElementById('bandeja-' + name);
  try {
    const d = await (await fetch(`/caja/api/bandeja/${name}`)).json();
    const pedidos = d.pedidos || [];
    const cnt = document.getElementById('cnt-' + name);
    if (cnt) cnt.textContent = pedidos.length ? `(${pedidos.length})` : '·';
    if (!pedidos.length) {
      box.innerHTML = `<div class="muted">${empty_msg(name)}</div>`;
      return;
    }
    box.innerHTML = pedidos.map(pedidoCard).join('');
  } catch (e) {
    box.innerHTML = '<div class="muted">Error: ' + esc(e.message) + '</div>';
  }
}

function empty_msg(name) {
  return name === 'por_cobrar' ? 'No hay nada por cobrar ✨'
       : name === 'cadetes'    ? 'No hay pedidos esperando cadete.'
       : name === 'drogueria'  ? 'Sin pedidos a la espera de droguería.'
       : 'Sin pedidos.';
}

function pedidoCard(p) {
  const prio = p.prioridad === 'urgente' ? '🚨' : p.prioridad === 'alta' ? '⭐' : '';
  const flags = [
    p.obra_social ? `<span class="badge" style="background:#7c4dff; color:#fff;">${esc(p.obra_social)}</span>` : '',
    p.receta === 'pendiente' ? '<span class="badge" style="background:var(--warn); color:#1a1206;">📋 receta</span>' : '',
    p.firma ? '<span class="badge" style="background:#0ea5e9; color:#06283d;">📝 firma</span>' : '',
    p.stock === 'esperar' ? '<span class="badge" style="background:#a78bfa; color:#1e1238;">📦 esperar drog.</span>' : '',
  ].filter(Boolean).join(' ');
  const direccion = [p.direccion, p.piso && 'P.'+p.piso, p.depto && 'D.'+p.depto].filter(Boolean).join(' · ');
  const datoMp = p.dato_pago_mp ? `<div class="row"><span class="muted">📋 Dato pago MP</span><span style="font-family:monospace;">${esc(p.dato_pago_mp)}</span></div>` : '';
  const envio = p.envio !== null && p.envio !== undefined ? `<div class="row"><span class="muted">Envío</span><span>${fmt(p.envio)}</span></div>` : '';
  return `<div class="card">
    <div class="card-head">
      <span class="title" style="font-weight:600; font-size:13px;">${prio} ${esc(p.cliente || 'Sin nombre')}</span>
      <span class="badge b-conf">#${p.id}</span>
    </div>
    <div style="padding:8px 13px;">
      ${direccion ? `<div class="row"><span class="muted">📍</span><span style="text-align:right;">${esc(direccion)}</span></div>` : ''}
      <div class="row"><span class="muted">Forma pago</span><span>${esc(p.forma_pago || '—')}</span></div>
      ${datoMp}
      ${envio}
      ${flags ? `<div style="display:flex; gap:5px; flex-wrap:wrap; padding:6px 0;">${flags}</div>` : ''}
      <div style="display:flex; justify-content:space-between; align-items:center; padding-top:6px;">
        <span class="muted2" style="font-size:11px;">${esc(p.tomo || '')} · ${esc((p.creado_en||'').slice(0,16).replace('T',' '))}</span>
        <span class="total">${fmt(p.total)}</span>
      </div>
    </div>
  </div>`;
}

cargarFormas();
setTab(tabActiva);
setInterval(() => { if (BANDEJAS.includes(tabActiva)) cargarBandeja(tabActiva); else cargar(); }, 5000);
</script>
</body>
</html>
