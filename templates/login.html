<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingresar — Farmacia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: { brand: { DEFAULT: '#EAB308', hover: '#CA8A04', dark: '#1a1100' } }
        }}}
    </script>
    <style>body { background-color: #f3f3f3; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm bg-white rounded-2xl border border-[#e0e0e0] shadow-sm p-8">
        <div class="text-center mb-6">
            <div class="w-12 h-12 mx-auto mb-3 rounded-xl bg-brand flex items-center justify-center">
                <svg class="w-6 h-6 text-brand-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h1 class="text-xl font-bold text-[#1e1e1e]">Farmacia</h1>
            <p class="text-xs text-[#999] mt-1">Ingresá para continuar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for cat, msg in messages %}
        <div class="mb-4 px-3 py-2 rounded-lg text-xs border
            {% if cat == 'error' %}bg-red-50 text-red-800 border-red-200
            {% elif cat == 'warning' %}bg-amber-50 text-amber-800 border-amber-200
            {% else %}bg-sky-50 text-sky-800 border-sky-200{% endif %}">
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="post" class="space-y-3">
            <div>
                <label class="text-xs font-semibold text-[#6f6f6f] uppercase tracking-wide block mb-1">Usuario</label>
                <input type="text" name="username" value="{{ username or '' }}" required autofocus autocomplete="username"
                    class="w-full bg-[#f5f5f5] border border-[#e0e0e0] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand">
            </div>
            <div>
                <label class="text-xs font-semibold text-[#6f6f6f] uppercase tracking-wide block mb-1">Contraseña</label>
                <input type="password" name="password" required autocomplete="current-password"
                    class="w-full bg-[#f5f5f5] border border-[#e0e0e0] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand">
            </div>
            <button type="submit"
                class="w-full bg-brand hover:bg-brand-hover text-brand-dark font-semibold py-2 rounded-lg text-sm transition-colors mt-2">
                Ingresar
            </button>
        </form>
    </div>
</body>
</html>
