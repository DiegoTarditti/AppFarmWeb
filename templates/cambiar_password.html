{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}
{% block main %}
<div class="flex-1 overflow-auto p-6">
    <div class="max-w-md mx-auto bg-white border border-surface-border rounded-xl p-6">
        <h1 class="text-lg font-bold text-[#1e1e1e] mb-1">Cambiar contraseña</h1>
        <p class="text-xs text-[#6f6f6f] mb-5">Mínimo 6 caracteres.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="mb-4 px-3 py-2 rounded-lg text-xs border
            {% if cat == 'error' %}bg-red-50 text-red-800 border-red-200
            {% elif cat == 'success' %}bg-emerald-50 text-emerald-800 border-emerald-200
            {% else %}bg-sky-50 text-sky-800 border-sky-200{% endif %}">{{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <form method="post" class="space-y-3">
            <div>
                <label class="text-xs font-semibold text-[#6f6f6f] uppercase tracking-wide block mb-1">Contraseña actual</label>
                <input type="password" name="password_actual" required
                    class="w-full bg-surface-input border border-surface-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand">
            </div>
            <div>
                <label class="text-xs font-semibold text-[#6f6f6f] uppercase tracking-wide block mb-1">Nueva contraseña</label>
                <input type="password" name="password_nueva" required minlength="6"
                    class="w-full bg-surface-input border border-surface-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand">
            </div>
            <div>
                <label class="text-xs font-semibold text-[#6f6f6f] uppercase tracking-wide block mb-1">Repetir nueva</label>
                <input type="password" name="password_confirmar" required minlength="6"
                    class="w-full bg-surface-input border border-surface-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-brand">
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-brand-dark font-semibold py-2 rounded-lg text-sm transition-colors mt-2">
                Actualizar
            </button>
        </form>
    </div>
</div>
{% endblock %}
