services:
  db:
    image: postgres:15
    restart: unless-stopped
    command: postgres -c timezone=UTC -c log_timezone=UTC
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: farmacia
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${FARMACIA_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  observer_db:
    image: postgres:15
    restart: unless-stopped
    command: postgres -c timezone=UTC -c log_timezone=UTC
    environment:
      POSTGRES_USER: observer
      POSTGRES_PASSWORD: observer
      POSTGRES_DB: observer
      PGTZ: UTC
    volumes:
      - observer_pgdata:/var/lib/postgresql/data
      - ./observer_seed:/docker-entrypoint-initdb.d:ro
    ports:
      - "${OBSERVER_DB_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observer"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "pip install --quiet beautifulsoup4 lxml flask-login &&
             gunicorn --bind 0.0.0.0:5000 --timeout 120 --workers 2 app:app"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/farmacia
      OBSERVER_DATABASE_URL: postgresql://observer:observer@observer_db:5432/observer
      SECRET_KEY: replace-this-secret
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${WEB_PORT:-5001}:5000"
    depends_on:
      db:
        condition: service_healthy
      observer_db:
        condition: service_healthy
    volumes:
      - ./:/app

volumes:
  pgdata:
  observer_pgdata:
