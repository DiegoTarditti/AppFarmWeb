services:
  db:
    image: postgres:18
    restart: unless-stopped
    command: postgres -c timezone=UTC -c log_timezone=UTC
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: farmacia
      PGTZ: UTC
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${FARMACIA_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  observer_db:
    image: postgres:15
    restart: unless-stopped
    command: postgres -c timezone=UTC -c log_timezone=UTC
    environment:
      POSTGRES_USER: observer
      POSTGRES_PASSWORD: observer
      POSTGRES_DB: observer
      PGTZ: UTC
    volumes:
      - observer_pgdata:/var/lib/postgresql/data
      - ./observer_seed:/docker-entrypoint-initdb.d:ro
    ports:
      - "${OBSERVER_DB_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observer"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "pip install --quiet beautifulsoup4 lxml flask-login anthropic requests &&
             gunicorn --bind 0.0.0.0:5000 --timeout 900 --workers 2 app:app"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/farmacia
      OBSERVER_DATABASE_URL: postgresql://observer:observer@observer_db:5432/observer
      SECRET_KEY: replace-this-secret
      TZ: America/Argentina/Buenos_Aires
      # Solo LOCAL: corre las migraciones (ALTER TABLE IF NOT EXISTS) en cada
      # arranque del contenedor, así tras un `git pull` con columnas/tablas
      # nuevas no hace falta correr init_db a mano. En Render esta var NO se
      # setea — allá init_db en startup colgaba el bind del puerto (ver
      # docs/lecciones_deploy_render.md).
      RUN_INIT_DB_ON_STARTUP: "1"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Token del bot (Telegram hoy). Lo usa el bot para escuchar y el panel de
      # atención (/atencion) para enviar las respuestas del operador al cliente.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Transcripción de notas de voz. Por defecto usa Whisper LOCAL (sin key,
      # privado). WHISPER_MODEL: base (default) | small | medium (más exacto, más
      # lento). OPENAI_API_KEY solo se usa como fallback si el modelo local no carga.
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Conexión a DB real de ObServer (SQL Server 2014). Si no seteás OBSERVER_HOST,
      # observer_source.observer_disponible() devuelve False y el sync queda deshabilitado.
      OBSERVER_HOST: ${OBSERVER_HOST:-}
      OBSERVER_PORT: ${OBSERVER_PORT:-1433}
      OBSERVER_USER: ${OBSERVER_USER:-}
      OBSERVER_PASS: ${OBSERVER_PASS:-}
      OBSERVER_DB:   ${OBSERVER_DB:-ObServerGestion}
      OBSERVER_TDSVER: ${OBSERVER_TDSVER:-7.0}
      OBSERVER_ID_FARMACIA: ${OBSERVER_ID_FARMACIA:-10525}
      # External URL del Postgres de Render. Usada por el job que replica obs_*.
      RENDER_DATABASE_URL: ${RENDER_DATABASE_URL:-}
      # Sync/pull ofertas local ↔ Render. PANEL_REMOTO_TOKEN es el mismo
      # que ya usa el DockerPanel para hablar con Render (X-Panel-Token).
      RENDER_BASE_URL: ${RENDER_BASE_URL:-}
      PANEL_REMOTO_TOKEN: ${PANEL_REMOTO_TOKEN:-}
      # /transferencias: BADIA_DATABASE_URL es fallback legacy (sin tabla sucursales).
      BADIA_DATABASE_URL: ${BADIA_DATABASE_URL:-}
      # Slug de esta sucursal (si no, se autodetecta por db_name vs DATABASE_URL).
      SUCURSAL_LOCAL: ${SUCURSAL_LOCAL:-}
    ports:
      - "${WEB_PORT:-5000}:5000"
      # AppNúcleo (dashboard de grupo) corre standalone en 5001 para dev local.
      - "${NUCLEO_PORT:-5001}:5001"
    # Si no tenés .env, el default es 5000.
    depends_on:
      db:
        condition: service_healthy
      observer_db:
        condition: service_healthy
    volumes:
      - ./:/app

  # Bot asistente (Telegram, long polling). Levanta solo con el stack y se
  # reinicia si crashea o al reiniciar la máquina (restart: unless-stopped).
  # Misma imagen que web; comparte la DB local. NO necesita observer_db ni puerto.
  # El proceso de WhatsApp (Fase 2) será un webhook dentro de `web`, no acá.
  bot:
    build: .
    restart: unless-stopped
    command: python -m bot.telegram_bot
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/farmacia
      TZ: America/Argentina/Buenos_Aires
      # IA (conversación + visión de recetas).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Token del bot. Ponelo en el .env (gitignored) para que arranque solo.
      # Sin token, el proceso sale con error claro (y restart lo reintenta).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Transcripción de notas de voz: Whisper local por defecto.
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Auto-retorno al bot tras inactividad (minutos). Prod ~180 (3 hs); en .env
      # se puede bajar (ej. 1) para probar.
      ATENCION_AUTO_BOT_MINUTOS: ${ATENCION_AUTO_BOT_MINUTOS:-180}
      # Re-enganche proactivo: minutos de silencio a mitad de un flujo antes del
      # "¿Seguís ahí?". 0 = desactivado.
      ATENCION_REENGANCHE_MINUTOS: ${ATENCION_REENGANCHE_MINUTOS:-5}
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started   # web corre init_db (crea las tablas del bot)
    volumes:
      - ./:/app

volumes:
  pgdata:
  observer_pgdata:
